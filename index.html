const getWeekDays = (from=TODAY) => Array.from({length:7},(_,i)=>{const d=new Date(from+"T12:00:00");d.setDate(d.getDate()+i);return d.toISOString().split("T")[0];});

function getMonthDays(year, month) {
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  const prev = new Date(year, month, 0).getDate();
  const cells = [];
  for(let i=(first===0?6:first-1); i>0; i--) cells.push({day:prev-i+1,cur:false});
  for(let i=1; i<=days; i++) cells.push({day:i,cur:true});
  while(cells.length%7!==0) cells.push({day:cells.length-days-(first===0?6:first-1)+1,cur:false});
  return cells;
}

function calcStreak(history) {
  if(!history.length) return 0;
  const dates = [...new Set(history.map(h=>h.date))].sort((a,b)=>b.localeCompare(a));
  let streak = 0, prev = null;
  for(const d of dates) {
    if(!prev) { streak=1; prev=d; continue; }
    const diff = Math.round((new Date(prev+"T12:00:00") - new Date(d+"T12:00:00")) / 86400000);
    if(diff<=7) { streak++; prev=d; } else break;
  }
  return streak;
}

// ── ROOT ───────────────────────────────────────────────────────────────────

      {mode==="login"&&<LoginScreen {...{loginTab,setLoginTab,loginName,setLoginName,loginCode,setLoginCode,adminPass,setAdminPass,loginErr,setLoginErr,handleClientLogin,handleAdminLogin}}/>}

      {mode==="client"&&loggedClient&&<ClientPortal client={loggedClient} allSessions={sessions} allHistory={history} loadAll={loadAll} notify={notify} onLogout={()=>{setLoggedClient(null);setMode("login");}}/>}

// ── ADMIN ──────────────────────────────────────────────────────────────────
function AdminPanel({clients,sessions,history,payments,blocked,loadAll,notify,onLogout}) {
  const [view,setView] = React.useState("dashboard");
  const [expanded,setExpanded] = React.useState(null);
  const [waClient,setWaClient] = React.useState(null);
  const [showBulkWA,setShowBulkWA] = React.useState(false);
  const [showNC,setShowNC] = React.useState(false);
  const [showNS,setShowNS] = React.useState(false);
  const [showPay,setShowPay] = React.useState(null);
  const [saving,setSaving] = React.useState(false);
  const [calDate,setCalDate] = React.useState(new Date());
  const [activeDay,setActiveDay] = React.useState(TODAY);
  const [nc,setNc] = React.useState({name:"",code:"",phone:"",email:"",sessions:10,cost:100,nextPayment:"",welcome:"",notes:""});
  const [ns,setNs] = React.useState({clientId:"",date:TODAY,time:"07:00",type:"Fuerza",confirmed:true});

  const reminders = [];
  clients.forEach(c=>{
    const d=daysUntil(c.next_payment);
    if(d<=5) reminders.push({c,type:"payment",days:d,urgent:d<=2});
    if(c.sessions_left<=2&&c.sessions_left>0) reminders.push({c,type:"sessions",urgent:c.sessions_left<=1});
    if(c.sessions_left===0) reminders.push({c,type:"expired",urgent:true});
  });
  const requests = sessions.filter(s=>s.requested);
  const todaySessions = sessions.filter(s=>s.date===TODAY&&!s.requested);
  const alertCount = reminders.filter(r=>r.urgent).length+requests.length;

  // Income stats
  const thisMonth = new Date().toISOString().slice(0,7);
  const monthIncome = payments.filter(p=>p.paid_at&&p.paid_at.startsWith(thisMonth)).reduce((a,p)=>a+parseFloat(p.amount||0),0);
  const totalIncome = payments.reduce((a,p)=>a+parseFloat(p.amount||0),0);

  const w = async (fn) => { setSaving(true); await fn(); await loadAll(); setSaving(false); };

  const addClient = () => w(async()=>{
    if(!nc.name||!nc.code||!nc.nextPayment) return notify("Completa los campos requeridos","err");
    if(nc.code.length!==4) return notify("El código debe tener 4 dígitos","err");
    if(clients.find(c=>c.code===nc.code)) return notify("Ese código ya existe","err");
    const color=COLORS[clients.length%COLORS.length];
    const {error}=await sb.from("clients").insert({name:nc.name,code:nc.code,phone:nc.phone,email:nc.email,color,sessions_left:parseInt(nc.sessions),total_sessions:parseInt(nc.sessions),next_payment:nc.nextPayment,payment_amount:parseFloat(nc.cost),welcome_msg:nc.welcome,notes:nc.notes});
    if(error) return notify("Error: "+error.message,"err");
    setShowNC(false); setNc({name:"",code:"",phone:"",email:"",sessions:10,cost:100,nextPayment:"",welcome:"",notes:""});
    notify("Cliente añadido ✓");
  });

  const saveNotes = (clientId, notes) => w(async()=>{
    await sb.from("clients").update({notes}).eq("id",clientId);
    notify("Notas guardadas ✓");
  });

  const addSession = () => w(async()=>{
    if(!ns.clientId) return notify("Selecciona un cliente","err");
    const {error}=await sb.from("sessions").insert({client_id:ns.clientId,date:ns.date,time:ns.time,type:ns.type,status:ns.confirmed?"confirmed":"pending",requested:false});
    if(error) return notify("Error: "+error.message,"err");
    setShowNS(false); setNs({clientId:"",date:TODAY,time:"07:00",type:"Fuerza",confirmed:true});
    notify("Sesión agendada ✓");
  });

  const completeSession = (sess) => w(async()=>{
    await sb.from("sessions").delete().eq("id",sess.id);
    await sb.from("history").insert({client_id:sess.client_id,date:sess.date,time:sess.time,type:sess.type});
    const client=clients.find(c=>c.id===sess.client_id);
    if(client) await sb.from("clients").update({sessions_left:Math.max(0,client.sessions_left-1)}).eq("id",client.id);
    notify("Sesión completada ✓");
  });

  const deleteSession = (id) => w(async()=>{ await sb.from("sessions").delete().eq("id",id); notify("Sesión eliminada"); });
  const approveRequest = (id) => w(async()=>{ await sb.from("sessions").update({requested:false,status:"confirmed"}).eq("id",id); notify("Solicitud aprobada ✓"); });
  const denyRequest = (id) => w(async()=>{ await sb.from("sessions").delete().eq("id",id); notify("Solicitud rechazada"); });

  const markPayment = (client, amount) => w(async()=>{
    const next=new Date(client.next_payment+"T12:00:00"); next.setMonth(next.getMonth()+1);
    await sb.from("clients").update({next_payment:next.toISOString().split("T")[0]}).eq("id",client.id);
    await sb.from("payments").insert({client_id:client.id,client_name:client.name,amount:amount||client.payment_amount,paid_at:TODAY});
    setShowPay(null); notify("Pago registrado ✓");
  });

  const renewSessions = (client) => w(async()=>{ await sb.from("clients").update({sessions_left:client.total_sessions}).eq("id",client.id); notify("Sesiones renovadas ✓"); });
  const deleteClient = (id) => w(async()=>{ await sb.from("clients").delete().eq("id",id); setExpanded(null); notify("Cliente eliminado"); });

  const toggleBlock = (date, time) => w(async()=>{
    const ex=blocked.find(b=>b.date===date&&b.time===time);
    if(ex) await sb.from("blocked_slots").delete().eq("id",ex.id);
    else await sb.from("blocked_slots").insert({date,time});
    notify(ex?"Horario desbloqueado":"Horario bloqueado");
  });

  const isBlocked = (date,time) => blocked.some(b=>b.date===date&&b.time===time);

  // Calendar helpers
  const calYear=calDate.getFullYear(), calMonth=calDate.getMonth();
  const calDays=getMonthDays(calYear,calMonth);
  const getDayStr=(day)=>`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

  const clientsPayingPending = clients.filter(c=>daysUntil(c.next_payment)<=5);
  const clientsLowSessions = clients.filter(c=>c.sessions_left<=2);

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#0ea5e9,#4ade80)",zIndex:500}}/>}
      {/* Sidebar */}
      <div style={{width:200,flexShrink:0,padding:"22px 10px",display:"flex",flexDirection:"column",gap:3,borderRight:"1px solid #0d1520",position:"sticky",top:0,height:"100vh",overflow:"auto"}}>
        <div style={{paddingLeft:8,marginBottom:22}}>
          <div style={{fontSize:16}}>🏋️</div>
          <div className="mono" style={{fontSize:13,fontWeight:700,color:"#0ea5e9",marginTop:2}}>{GYM_NAME}</div>
        </div>
        {[
          {id:"dashboard",icon:"◈",label:"Dashboard"},
          {id:"clients",icon:"◉",label:"Clientes"},
          {id:"schedule",icon:"◷",label:"Agenda"},
          {id:"calendar",icon:"▦",label:"Calendario"},
          {id:"income",icon:"€",label:"Ingresos"},
          {id:"reminders",icon:"◎",label:`Alertas${alertCount>0?` · ${alertCount}`:""}`,alert:alertCount>0},
        ].map(item=>(
          <button key={item.id} className={`nav ${view===item.id?"on":""}`} onClick={()=>setView(item.id)}>
            <span style={{fontSize:14}}>{item.icon}</span>
            <span style={{color:item.alert&&view!==item.id?"#facc15":undefined}}>{item.label}</span>
          </button>
        ))}
        <div style={{marginTop:"auto",borderTop:"1px solid #0d1520",paddingTop:12}}>
          <button className="nav" style={{color:"#4ade80",fontSize:12}} onClick={()=>setShowBulkWA(true)}>📱 WA masivo</button>
          <button className="nav" onClick={onLogout} style={{color:"#ef4444"}}>⏏ Salir</button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"26px 20px"}} className="fade">

        {/* DASHBOARD */}
        {view==="dashboard"&&(
          <div>
            <div style={{marginBottom:24}}>
              <h1 className="mono" style={{fontSize:20,fontWeight:700}}>{GYM_NAME} — Dashboard</h1>
              <p style={{color:"#334155",fontSize:12,marginTop:4}}>{fmtLong(TODAY)}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:20}}>
              {[
                {label:"Clientes",val:clients.length,color:"#38bdf8"},
                {label:"Activos",val:clients.filter(c=>statusOf(c)==="active").length,color:"#4ade80"},
                {label:"Alertas",val:reminders.length,color:"#facc15"},
                {label:"Sesiones hoy",val:todaySessions.length,color:"#a78bfa"},
                {label:"Este mes",val:`${monthIncome}€`,color:"#4ade80"},
              ].map(s=>(
                <div key={s.label} className="card">
                  <div className="mono" style={{fontSize:22,fontWeight:700,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:"#334155",marginTop:5,fontWeight:700}}>{s.label.toUpperCase()}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div className="card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <h3 style={{fontSize:13,fontWeight:700}}>Sesiones de hoy</h3>
                  <button className="btn sky" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>{setView("schedule");setShowNS(true);}}>+ Nueva</button>
                </div>
                {todaySessions.length===0?<p style={{fontSize:12,color:"#1e293b"}}>Sin sesiones hoy</p>
                  :todaySessions.sort((a,b)=>a.time.localeCompare(b.time)).map(s=>{
                    const c=clients.find(x=>x.id===s.client_id); if(!c) return null;
                    return(
                      <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #0d1520"}}>
                        <div className="ring" style={{width:32,height:32,background:c.color+"20",color:c.color,fontSize:10}}>{ini(c.name)}</div>
                        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{c.name}</div><div style={{fontSize:11,color:"#475569"}}>{s.type}</div></div>
                        <div style={{textAlign:"right"}}>
                          <div className="mono" style={{fontSize:13,fontWeight:600,color:"#38bdf8"}}>{s.time}</div>
                          <button className="btn grn" style={{fontSize:10,padding:"3px 7px",marginTop:3}} onClick={()=>completeSession(s)}>✓ Hecha</button>
                        </div>
                      </div>
                    );
                  })
                }
              </div>
              <div className="card">
                <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>Solicitudes pendientes</h3>
                {requests.length===0?<p style={{fontSize:12,color:"#1e293b"}}>Sin solicitudes ✓</p>
                  :requests.map(r=>{
                    const c=clients.find(x=>x.id===r.client_id); if(!c) return null;
                    return(
                      <div key={r.id} style={{background:"#080f1e",borderRadius:10,padding:10,marginBottom:8,border:"1px solid #1e3a5a"}}>
                        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
                          <div className="ring" style={{width:30,height:30,background:c.color+"20",color:c.color,fontSize:10}}>{ini(c.name)}</div>
                          <div><div style={{fontSize:12,fontWeight:700}}>{c.name}</div><div style={{fontSize:11,color:"#64748b"}}>{r.type} · {fmtDate(r.date)} {r.time}</div></div>
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn grn" style={{flex:1,fontSize:11,padding:"6px 8px"}} onClick={()=>approveRequest(r.id)}>✓ Aprobar</button>
                          <button className="btn danger" style={{flex:1,fontSize:11,padding:"6px 8px"}} onClick={()=>denyRequest(r.id)}>✕ Rechazar</button>
                        </div>
                      </div>
                    );
                  })
                }
              </div>
            </div>
          </div>
        )}

        {/* CLIENTS */}
        {view==="clients"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <div><h1 className="mono" style={{fontSize:20,fontWeight:700}}>Clientes</h1><p style={{color:"#334155",fontSize:12,marginTop:3}}>{clients.length} registrados</p></div>
              <button className="btn sky" onClick={()=>setShowNC(true)}>+ Nuevo</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
              {clients.map(c=>{
                const st=statusOf(c),pct=Math.round(c.sessions_left/c.total_sessions*100),pd=daysUntil(c.next_payment),open=expanded===c.id;
                const cSess=sessions.filter(s=>s.client_id===c.id&&s.date>=TODAY);
                const cHist=history.filter(h=>h.client_id===c.id);
                const streak=calcStreak(cHist);
                return(
                  <div key={c.id} className="card" style={{cursor:"pointer",transition:"all .2s",border:`1px solid ${open?"#0e3a5c":"var(--border)"}`}} onClick={()=>setExpanded(open?null:c.id)}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div style={{display:"flex",gap:11,alignItems:"center"}}>
                        <div className="ring" style={{width:42,height:42,background:c.color+"18",color:c.color,border:`1.5px solid ${c.color}35`,fontSize:13}}>{ini(c.name)}</div>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{c.name}</div>
                          <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
                            <div className="mono" style={{color:"#334155",fontSize:11}}>#{c.code}</div>
                            {streak>0&&<span style={{fontSize:10,color:"#fb923c"}}>🔥{streak}</span>}
                          </div>
                        </div>
                      </div>
                      <span className="pill" style={{background:statusColor(st)+"18",color:statusColor(st),border:`1px solid ${statusColor(st)}30`}}>{statusLabel(st)}</span>
                    </div>
                    <div style={{marginBottom:11}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                        <span style={{fontSize:10,color:"#475569",fontWeight:700}}>SESIONES</span>
                        <span className="mono" style={{fontSize:11,fontWeight:700}}>{c.sessions_left}/{c.total_sessions}</span>
                      </div>
                      <div className="pbar"><div className="pfill" style={{width:`${pct}%`,background:pct>40?"#4ade80":pct>20?"#facc15":"#f87171"}}/></div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:10,color:"#334155",fontWeight:700}}>PRÓXIMO PAGO</div>
                        <div style={{fontSize:12,color:pd<=3?"#f87171":"#64748b"}}>{pd<0?"Vencido":pd===0?"Hoy":`${pd}d`} · {c.payment_amount}€</div>
                      </div>
                      <button className="btn wa" style={{fontSize:11}} onClick={e=>{e.stopPropagation();setWaClient(c);}}>📱 WA</button>
                    </div>
                    {open&&(
                      <div style={{marginTop:14,borderTop:"1px solid #0d1520",paddingTop:14}} onClick={e=>e.stopPropagation()}>
                        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
                          <button className="btn sky" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setShowPay(c)}>💳 Pago</button>
                          <button className="btn grn" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>renewSessions(c)}>↺ Renovar</button>
                          <button className="btn danger" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>deleteClient(c.id)}>🗑</button>
                        </div>
                        {/* Private notes */}
                        <div style={{marginBottom:14}}>
                          <span className="lbl">NOTAS PRIVADAS (solo tú las ves)</span>
                          <NotesEditor initialNotes={c.notes||""} onSave={(n)=>saveNotes(c.id,n)}/>
                        </div>
                        <div style={{fontSize:10,color:"#334155",fontWeight:700,marginBottom:8}}>PRÓXIMAS SESIONES</div>
                        {cSess.length===0?<p style={{fontSize:12,color:"#1e293b"}}>Sin sesiones agendadas</p>
                          :cSess.sort((a,b)=>a.date.localeCompare(b.date)).map(s=>(
                            <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #090f1a"}}>
                              <div>
                                <div style={{fontSize:12}}>{fmtDate(s.date)} · {s.time}</div>
                                <div style={{fontSize:11,color:"#475569"}}>{s.type}{s.requested&&<span style={{color:"#fb923c",marginLeft:6,fontWeight:700}}>· solicitud</span>}</div>
                              </div>
                              <div style={{display:"flex",gap:5}}>
                                {s.requested
                                  ?<><button className="btn grn" style={{fontSize:10,padding:"4px 7px"}} onClick={()=>approveRequest(s.id)}>✓</button>
                                    <button className="btn danger" style={{padding:"4px 7px"}} onClick={()=>denyRequest(s.id)}>✕</button></>
                                  :<><button className="btn sky" style={{fontSize:10,padding:"4px 7px"}} onClick={()=>completeSession(s)}>✓ Hecha</button>
                                    <button className="btn danger" style={{padding:"4px 7px"}} onClick={()=>deleteSession(s.id)}>✕</button></>
                                }
                              </div>
                            </div>
                          ))
                        }
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* SCHEDULE */}
        {view==="schedule"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <div><h1 className="mono" style={{fontSize:20,fontWeight:700}}>Agenda</h1><p style={{color:"#334155",fontSize:12,marginTop:3}}>Semana del {fmtDate(getWeekDays()[0])}</p></div>
              <button className="btn sky" onClick={()=>setShowNS(true)}>+ Agendar</button>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:18,overflowX:"auto",paddingBottom:4}}>
              {getWeekDays().map(day=>{
                const cnt=sessions.filter(s=>s.date===day).length;
                return <button key={day} className={`tab ${activeDay===day?"on":""}`} onClick={()=>setActiveDay(day)}>
                  <div>{fmtDate(day)}</div>
                  {cnt>0&&<div style={{fontSize:10,color:"#38bdf8",marginTop:1}}>{cnt}</div>}
                </button>;
              })}
            </div>
            <div className="card" style={{padding:0,overflow:"hidden"}}>
              {TIME_SLOTS.map((time,i)=>{
                const slotBlocked=isBlocked(activeDay,time);
                const slots=!slotBlocked?sessions.filter(s=>s.date===activeDay&&s.time===time).map(s=>({...s,client:clients.find(c=>c.id===s.client_id)})).filter(s=>s.client):[];
                return(
                  <div key={time} style={{display:"flex",borderBottom:i<TIME_SLOTS.length-1?"1px solid #0d1520":"none",minHeight:50,background:slotBlocked?"#0d0505":"transparent"}}>
                    <div className="mono" style={{width:60,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",borderRight:"1px solid #0d1520",color:slotBlocked?"#4a1515":"#1e3a5a",fontSize:11,fontWeight:700}}>{time}</div>
                    <div style={{flex:1,padding:"7px 12px",display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
                      {slotBlocked
                        ?<span style={{fontSize:11,color:"#4a1515",cursor:"pointer"}} onClick={()=>toggleBlock(activeDay,time)}>🚫 Bloqueado — clic para desbloquear</span>
                        :<>
                          {slots.length===0&&<span style={{fontSize:11,color:"#0d1520",cursor:"pointer"}} onClick={()=>toggleBlock(activeDay,time)}>Libre · 🔒</span>}
                          {slots.map(s=>(
                            <div key={s.id} style={{background:s.client.color+"14",border:`1px solid ${s.client.color}30`,borderRadius:7,padding:"4px 9px",fontSize:12,display:"flex",alignItems:"center",gap:6}}>
                              <span style={{color:s.client.color,fontWeight:700}}>{s.client.name}</span>
                              <span style={{color:"#475569"}}>{s.type}</span>
                              {s.requested&&<span style={{color:"#fb923c",fontSize:10}}>·req</span>}
                              <button style={{background:"none",border:"none",cursor:"pointer",color:"#4ade80",fontSize:11}} onClick={()=>completeSession(s)}>✓</button>
                            </div>
                          ))}
                        </>
                      }
                    </div>
                  </div>
                );
              })}
            </div>
            <p style={{fontSize:11,color:"#334155",marginTop:10}}>💡 Haz clic en "Libre · 🔒" para bloquear un horario (vacaciones, descanso, etc.)</p>
          </div>
        )}

        {/* CALENDAR */}
        {view==="calendar"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h1 className="mono" style={{fontSize:20,fontWeight:700}}>Calendario</h1>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={()=>{const d=new Date(calDate);d.setMonth(d.getMonth()-1);setCalDate(d);}}>‹</button>
                <span style={{fontSize:14,fontWeight:600,textTransform:"capitalize",minWidth:140,textAlign:"center"}}>{fmtMonth(calDate.toISOString().split("T")[0])}</span>
                <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={()=>{const d=new Date(calDate);d.setMonth(d.getMonth()+1);setCalDate(d);}}>›</button>
              </div>
            </div>
            <div className="card">
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
                {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d=>(
                  <div key={d} style={{textAlign:"center",fontSize:11,color:"#334155",fontWeight:700,padding:"4px 0"}}>{d}</div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                {calDays.map((cell,i)=>{
                  const dateStr=cell.cur?getDayStr(cell.day):"";
                  const hasSess=dateStr&&sessions.some(s=>s.date===dateStr);
                  const isToday=dateStr===TODAY;
                  const isBlk=dateStr&&blocked.some(b=>b.date===dateStr);
                  return(
                    <div key={i} className={`cal-day ${!cell.cur?"other-month":""} ${hasSess&&cell.cur?"has-session":""} ${isToday?"today":""} ${isBlk&&cell.cur?"blocked":""}`}
                      onClick={()=>cell.cur&&setActiveDay(dateStr)&&setView("schedule")}>
                      <span>{cell.day}</span>
                      {hasSess&&cell.cur&&<span style={{position:"absolute",width:4,height:4,borderRadius:"50%",background:"#38bdf8",bottom:2,left:"50%",transform:"translateX(-50%)"}}/>}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{marginTop:16,display:"flex",gap:12,fontSize:11,color:"#334155"}}>
              <span>🔵 Con sesiones</span>
              <span>🔴 Bloqueado</span>
              <span style={{color:"#0ea5e9"}}>Hoy</span>
            </div>
          </div>
        )}

        {/* INCOME */}
        {view==="income"&&(
          <div>
            <h1 className="mono" style={{fontSize:20,fontWeight:700,marginBottom:22}}>Ingresos</h1>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:22}}>
              {[
                {label:"Este mes",val:`${monthIncome}€`,color:"#4ade80"},
                {label:"Total acumulado",val:`${totalIncome}€`,color:"#38bdf8"},
                {label:"Pagos registrados",val:payments.length,color:"#a78bfa"},
                {label:"Ticket medio",val:`${payments.length>0?Math.round(totalIncome/payments.length):0}€`,color:"#fb923c"},
              ].map(s=>(
                <div key={s.label} className="card">
                  <div className="mono" style={{fontSize:22,fontWeight:700,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:"#334155",marginTop:5,fontWeight:700}}>{s.label.toUpperCase()}</div>
                </div>
              ))}
            </div>
            <div className="card">
              <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>Historial de pagos</h3>
              {payments.length===0?<p style={{fontSize:13,color:"#1e293b"}}>Sin pagos registrados aún</p>
                :payments.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #0d1520"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600}}>{p.client_name}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:2}}>{p.paid_at}</div>
                    </div>
                    <div className="mono" style={{fontSize:15,fontWeight:700,color:"#4ade80"}}>{p.amount}€</div>
                  </div>
                ))
              }
            </div>
          </div>
        )}

        {/* REMINDERS */}
        {view==="reminders"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h1 className="mono" style={{fontSize:20,fontWeight:700}}>Alertas</h1>
              <button className="btn wa" onClick={()=>setShowBulkWA(true)}>📱 WA masivo</button>
            </div>
            {requests.length>0&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,color:"#fb923c",fontWeight:700,letterSpacing:1,marginBottom:10}}>SOLICITUDES</div>
                {requests.map(r=>{
                  const c=clients.find(x=>x.id===r.client_id); if(!c) return null;
                  return(
                    <div key={r.id} className="card" style={{marginBottom:8,border:"1px solid #2d1a08"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div className="ring" style={{width:40,height:40,background:c.color+"18",color:c.color,fontSize:12}}>{ini(c.name)}</div>
                        <div style={{flex:1}}><div style={{fontWeight:700}}>{c.name}</div><div style={{fontSize:12,color:"#fb923c"}}>📅 {r.type} · {fmtDate(r.date)} a las {r.time}</div></div>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn grn" style={{fontSize:11,padding:"7px 11px"}} onClick={()=>approveRequest(r.id)}>✓</button>
                          <button className="btn danger" onClick={()=>denyRequest(r.id)}>✕</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {reminders.length===0&&requests.length===0
              ?<div className="card" style={{textAlign:"center",padding:48}}><div style={{fontSize:32,marginBottom:10}}>✓</div><div style={{color:"#4ade80",fontWeight:700}}>Todo al día</div></div>
              :reminders.map((r,i)=>(
                <div key={i} className="card" style={{marginBottom:10,border:`1px solid ${r.urgent?"#3f1a1a":"#1a2d1a"}`,background:r.urgent?"#080404":"#040804"}}>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div className="ring" style={{width:42,height:42,background:r.c.color+"18",color:r.c.color,fontSize:13}}>{ini(r.c.name)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700}}>{r.c.name}</div>
                      <div style={{fontSize:12,color:r.urgent?"#f87171":"#facc15",marginTop:2}}>
                        {r.type==="payment"&&`💳 ${r.c.payment_amount}€ — ${r.days<0?`vencido hace ${Math.abs(r.days)}d`:r.days===0?"vence hoy":`en ${r.days}d`}`}
                        {r.type==="sessions"&&`⚡ ${r.c.sessions_left} sesión(es) restante(s)`}
                        {r.type==="expired"&&"🚫 Sin sesiones — necesita renovación"}
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {r.type==="payment"&&<button className="btn sky" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setShowPay(r.c)}>💳 Pago</button>}
                      {(r.type==="sessions"||r.type==="expired")&&<button className="btn grn" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>renewSessions(r.c)}>↺ Renovar</button>}
                      <button className="btn wa" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setWaClient(r.c)}>📱 WA</button>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      {/* Modals */}
      {showNS&&<SessionModal clients={clients} ns={ns} setNs={setNs} onSave={addSession} onClose={()=>setShowNS(false)}/>}
      {showNC&&<ClientModal nc={nc} setNc={setNc} onSave={addClient} onClose={()=>setShowNC(false)}/>}
      {showPay&&<PayModal client={showPay} onSave={(amt)=>markPayment(showPay,amt)} onClose={()=>setShowPay(null)}/>}
      {waClient&&<WAModal client={waClient} onClose={()=>setWaClient(null)} notify={notify}/>}
      {showBulkWA&&<BulkWAModal clients={clients} onClose={()=>setShowBulkWA(false)} notify={notify} clientsPayPending={clientsPayingPending} clientsLow={clientsLowSessions}/>}
    </div>
  );
}

// ── CLIENT PORTAL ──────────────────────────────────────────────────────────
function ClientPortal({client,allSessions,allHistory,loadAll,notify,onLogout}) {
  const [tab,setTab]=React.useState("home");
  const [reqDate,setReqDate]=React.useState(TODAY);
  const [reqTime,setReqTime]=React.useState("07:00");
  const [reqType,setReqType]=React.useState("Fuerza");
  const [saving,setSaving]=React.useState(false);

  const mySessions=allSessions.filter(s=>s.client_id===client.id&&s.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date));
  const myHistory=allHistory.filter(s=>s.client_id===client.id).sort((a,b)=>b.date.localeCompare(a.date));
  const pct=Math.round(client.sessions_left/client.total_sessions*100);
  const pd=daysUntil(client.next_payment);
  const streak=calcStreak(myHistory);
  const nextSess=mySessions.find(s=>!s.requested);
  const nextCountdown=nextSess?daysUntil(nextSess.date):null;
  const thisMonthSessions=myHistory.filter(h=>h.date&&h.date.startsWith(new Date().toISOString().slice(0,7))).length;

  const submitRequest=async()=>{
    if(client.sessions_left===0) return notify("Sin sesiones. Contacta a tu trainer.","err");
    setSaving(true);
    const {error}=await sb.from("sessions").insert({client_id:client.id,date:reqDate,time:reqTime,type:reqType,status:"pending",requested:true});
    if(error){notify("Error al enviar","err");setSaving(false);return;}
    await loadAll(); setSaving(false);
    notify("¡Solicitud enviada! Tu trainer la confirmará pronto 🎯");
    setTab("home");
  };

  return(
    <div style={{minHeight:"100vh",maxWidth:480,margin:"0 auto",padding:"22px 16px"}} className="fade">
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#0ea5e9,#4ade80)",zIndex:500}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>🏋️</span>
          <div className="mono" style={{fontSize:13,fontWeight:700,color:"#0ea5e9"}}>{GYM_NAME}</div>
        </div>
        <button className="btn ghost" style={{fontSize:12,padding:"6px 11px"}} onClick={onLogout}>Salir</button>
      </div>

      {/* Welcome message */}
      {client.welcome_msg&&(
        <div style={{background:"#060f1e",border:"1px solid #0e3a5c",borderRadius:14,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#94a3b8"}}>
          💬 {client.welcome_msg}
        </div>
      )}

      {/* Hero card */}
      <div className="hero-card" style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
          <div style={{display:"flex",gap:13,alignItems:"center"}}>
            <div className="ring" style={{width:50,height:50,background:client.color+"25",color:client.color,fontSize:17,border:`2px solid ${client.color}50`}}>{ini(client.name)}</div>
            <div>
              <div style={{fontWeight:800,fontSize:16}}>{client.name}</div>
              <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center"}}>
                {streak>0&&<span style={{fontSize:12,color:"#fb923c"}} className="streak-fire">🔥 {streak} semanas seguidas</span>}
                {streak===0&&<span style={{fontSize:11,color:"#334155"}}>Miembro activo</span>}
              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="mono" style={{fontSize:32,fontWeight:700,color:client.color,lineHeight:1}}>{client.sessions_left}</div>
            <div style={{fontSize:10,color:"#334155",fontWeight:700}}>SESIONES</div>
          </div>
        </div>

        {/* Progress */}
        <div style={{marginBottom:14}}>
          <div className="pbar" style={{height:9,background:"#071020"}}>
            <div className="pfill" style={{width:`${pct}%`,background:`linear-gradient(90deg,${pct>40?"#0ea5e9,#4ade80":pct>20?"#f59e0b,#fbbf24":"#ef4444,#f87171"})`}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:"#334155"}}>
            <span>{client.sessions_left} disponibles</span><span>{client.total_sessions} total</span>
          </div>
        </div>

        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{background:"#071020",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div className="mono" style={{fontSize:16,fontWeight:700,color:"#a78bfa"}}>{thisMonthSessions}</div>
            <div style={{fontSize:9,color:"#334155",fontWeight:700}}>ESTE MES</div>
          </div>
          <div style={{background:"#071020",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div className="mono" style={{fontSize:16,fontWeight:700,color:"#4ade80"}}>{myHistory.length}</div>
            <div style={{fontSize:9,color:"#334155",fontWeight:700}}>TOTAL</div>
          </div>
          <div style={{background:"#071020",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div className="mono" style={{fontSize:16,fontWeight:700,color:nextCountdown===0?"#facc15":nextCountdown!==null?"#38bdf8":"#334155"}}>
              {nextCountdown===null?"—":nextCountdown===0?"Hoy":`${nextCountdown}d`}
            </div>
            <div style={{fontSize:9,color:"#334155",fontWeight:700}}>PRÓXIMA</div>
          </div>
        </div>

        {/* Payment + countdown */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:"#334155",fontWeight:700}}>PRÓXIMO PAGO</div>
            <div style={{fontSize:13,color:pd<=3?"#f87171":pd<=7?"#facc15":"#64748b",marginTop:2}}>
              {client.payment_amount}€ · {pd<0?`Vencido hace ${Math.abs(pd)}d`:pd===0?"¡Vence hoy!":pd<=3?`⚠️ En ${pd} días`:`En ${pd} días`}
            </div>
          </div>
          <a href={waLink(TRAINER_PHONE,`Hola! Soy ${client.name} 💪`)} target="_blank" rel="noreferrer">
            <button className="btn wa" style={{fontSize:12}}>📱 Trainer</button>
          </a>
        </div>
      </div>

      <div className="seg" style={{marginBottom:18}}>
        {[["home","Mis sesiones"],["request","Solicitar"],["history","Historial"]].map(([id,label])=>(
          <button key={id} className={`sb ${tab===id?"on":""}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab==="home"&&(
        <div>
          <div style={{fontSize:10,color:"#334155",fontWeight:700,marginBottom:10}}>PRÓXIMAS SESIONES</div>
          {mySessions.length===0
            ?<div className="card" style={{textAlign:"center",padding:34}}>
              <div style={{fontSize:26,marginBottom:8}}>📅</div>
              <div style={{color:"#475569",fontSize:13}}>Sin sesiones agendadas</div>
              <button className="btn sky" style={{marginTop:12,padding:"9px 18px"}} onClick={()=>setTab("request")}>Solicitar sesión</button>

                    <div style={{fontSize:12,color:"#475569",marginTop:3}}>{fmtLong(s.date)}</div>

          <a href={waLink(TRAINER_PHONE,`Hola! Soy ${client.name} 👋`)} target="_blank" rel="noreferrer" style={{display:"block",marginTop:16}}>
            <button className="btn wa" style={{width:"100%",padding:12,justifyContent:"center",fontSize:13}}>📱 Chatear con mi trainer</button>

              <div style={{fontSize:26,marginBottom:8}}>🚫</div>
              <div style={{color:"#f87171",fontWeight:700,marginBottom:6}}>Sin sesiones disponibles</div>
              <a href={waLink(TRAINER_PHONE,`Hola! Soy ${client.name}, quisiera renovar mi paquete 💪`)} target="_blank" rel="noreferrer">
                <button className="btn wa" style={{justifyContent:"center",padding:"10px 20px"}}>📱 Renovar por WhatsApp</button>
              </a>
            </div>
            :<div className="card">
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{background:"#080f1e",borderRadius:10,padding:"11px 13px",border:"1px solid #1e3a5a",fontSize:13,color:"#475569"}}>
                  💡 Tu trainer recibirá la solicitud y la confirmará en breve.
                </div>
                <div><span className="lbl">FECHA</span><input type="date" className="inp" value={reqDate} min={TODAY} onChange={e=>setReqDate(e.target.value)}/></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><span className="lbl">HORA</span>
                    <select className="inp" style={{appearance:"none"}} value={reqTime} onChange={e=>setReqTime(e.target.value)}>
                      {TIME_SLOTS.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                  <div><span className="lbl">TIPO</span>
                    <select className="inp" style={{appearance:"none"}} value={reqType} onChange={e=>setReqType(e.target.value)}>
                      {SESSION_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                </div>
                <button className="btn sky" style={{width:"100%",padding:12}} onClick={submitRequest} disabled={saving}>
                  {saving?"Enviando...":"Enviar solicitud"}
                </button>
              </div>
            </div>
          }
        </div>
      )}

      {tab==="history"&&(
        <div>
          <div style={{fontSize:10,color:"#334155",fontWeight:700,marginBottom:10}}>HISTORIAL DE SESIONES</div>
          {myHistory.length===0
            ?<div className="card" style={{textAlign:"center",padding:34}}><div style={{fontSize:26,marginBottom:8}}>📋</div><div style={{color:"#475569",fontSize:13}}>Sin sesiones completadas aún</div></div>
            :myHistory.map(s=>(
              <div key={s.id} className="card" style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:700}}>{s.type}</div><div style={{fontSize:12,color:"#475569",marginTop:2}}>{fmtLong(s.date)}</div></div>
                  <div style={{textAlign:"right"}}><div className="mono" style={{color:"#475569",fontSize:12}}>{s.time}</div><div style={{fontSize:11,color:"#4ade80",marginTop:3}}>✓ Completada</div></div>
                </div>
              </div>
            ))
          }
          <div style={{marginTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div style={{padding:"14px",background:"#080f1e",borderRadius:12,border:"1px solid #1e3a5a",textAlign:"center"}}>
              <div className="mono" style={{fontSize:22,fontWeight:700,color:"#38bdf8"}}>{myHistory.length}</div>
              <div style={{fontSize:10,color:"#334155",fontWeight:700,marginTop:3}}>TOTAL</div>
            </div>
            <div style={{padding:"14px",background:"#080f1e",borderRadius:12,border:"1px solid #1e3a5a",textAlign:"center"}}>
              <div className="mono" style={{fontSize:22,fontWeight:700,color:"#fb923c"}}>{streak>0?`🔥${streak}`:"0"}</div>
              <div style={{fontSize:10,color:"#334155",fontWeight:700,marginTop:3}}>SEMANAS RACHA</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js')
      .then(function(r){ console.log('SW ok'); })
      .catch(function(e){ console.log('SW err', e); });
  });
}
</script>
</body>
</html>
