                {e.description&&<div style={{fontSize:11,color:"#475569",lineHeight:1.4}}>{e.description}</div>}
              </div>
              <button className="btn danger" style={{fontSize:10,padding:"4px 8px",marginLeft:8,flexShrink:0}} onClick={()=>deleteEx(e.id)}>🗑</button>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div className="card" style={{textAlign:"center",padding:32,color:"#334155"}}>Sin ejercicios en esta categoría</div>}
      </div>

      {showAdd&&(
        <div className="ovl" onClick={()=>setShowAdd(false)}>
          <div className="mdl fade" onClick={e=>e.stopPropagation()}>
            <h2 className="mono" style={{fontSize:17,fontWeight:700,marginBottom:18}}>Nuevo ejercicio</h2>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><span className="lbl">NOMBRE *</span><input className="inp" placeholder="Ej. Sentadilla Búlgara" value={ex.name} onChange={e=>setEx(v=>({...v,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><span className="lbl">CATEGORÍA</span>
                  <select className="inp" style={{appearance:"none"}} value={ex.category} onChange={e=>setEx(v=>({...v,category:e.target.value}))}>
                    {["Fuerza","Cardio","HIIT","Funcional","Movilidad"].map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div><span className="lbl">DIFICULTAD</span>
                  <select className="inp" style={{appearance:"none"}} value={ex.difficulty} onChange={e=>setEx(v=>({...v,difficulty:e.target.value}))}>
                    {DIFFS.map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
              </div>
              <div><span className="lbl">MÚSCULO PRINCIPAL</span><input className="inp" placeholder="Ej. Cuádriceps, Glúteos" value={ex.muscle_group} onChange={e=>setEx(v=>({...v,muscle_group:e.target.value}))}/></div>
              <div><span className="lbl">DESCRIPCIÓN</span><textarea className="inp" rows={3} style={{resize:"none"}} placeholder="Descripción del ejercicio..." value={ex.description} onChange={e=>setEx(v=>({...v,description:e.target.value}))}/></div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn sky" style={{flex:1,padding:11}} onClick={addExercise}>Añadir</button>
                <button className="btn ghost" style={{flex:1,padding:11}} onClick={()=>setShowAdd(false)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PLANS ADMIN ────────────────────────────────────────────────────────────
function PlansAdmin({plans, exercises, clients, clientPlans, loadAll, notify}) {
  const [tab, setTab] = React.useState("plans");
  const [showNewPlan, setShowNewPlan] = React.useState(false);
  const [editPlan, setEditPlan] = React.useState(null);
  const [np, setNp] = React.useState({name:"",description:"",category:"Fuerza",duration_weeks:4});
  const [showAssign, setShowAssign] = React.useState(null);
  const [assignClient, setAssignClient] = React.useState("");

  const createPlan = async() => {
    if(!np.name) return notify("Escribe el nombre del plan","err");
    const {data,error} = await sb.from("training_plans").insert(np).select().single();
    if(error) return notify("Error: "+error.message,"err");
    setShowNewPlan(false);
    setNp({name:"",description:"",category:"Fuerza",duration_weeks:4});
    await loadAll();
    notify("Plan creado ✓");
    setEditPlan(data);
  };

  const deletePlan = async(id) => {
    await sb.from("training_plans").delete().eq("id",id);
    await loadAll();
    notify("Plan eliminado");
  };

  const assignPlan = async(planId) => {
    if(!assignClient) return notify("Selecciona un cliente","err");
    await sb.from("client_plans").insert({client_id:assignClient,plan_id:planId,start_date:TODAY,active:true});
    setShowAssign(null); setAssignClient("");
    await loadAll();
    notify("Plan asignado ✓");
  };

  const addDay = async(planId) => {
    const dayNum = (editPlan?.plan_days?.length||0)+1;
    await sb.from("plan_days").insert({plan_id:planId,day_number:dayNum,day_name:`Día ${dayNum}`});
    await loadAll();
  };

  const addExToDay = async(dayId, exId, exName) => {
    const day = editPlan?.plan_days?.find(d=>d.id===dayId);
    const order = (day?.plan_exercises?.length||0);
    await sb.from("plan_exercises").insert({plan_day_id:dayId,exercise_id:exId,exercise_name:exName,sets:3,reps:"10",rest_seconds:60,order_index:order});
    await loadAll();
  };

  const removeEx = async(exId) => {
    await sb.from("plan_exercises").delete().eq("id",exId);
    await loadAll();
  };

  // Refresh editPlan from updated plans
  React.useEffect(()=>{
    if(editPlan) {
      const updated = plans.find(p=>p.id===editPlan.id);
      if(updated) setEditPlan(updated);
    }
  },[plans]);

  return(
    <div>
      <div className="seg" style={{marginBottom:14}}>
        {[["plans","📋 Planes"],["assign","👥 Asignaciones"]].map(([id,label])=>(
          <button key={id} className={"sb"+(tab===id?" on":"")} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab==="plans"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{fontSize:15,fontWeight:700}}>Planes de entrenamiento</h2>
            <button className="btn sky" style={{fontSize:12,padding:"8px 13px"}} onClick={()=>setShowNewPlan(true)}>+ Nuevo plan</button>
          </div>

          {editPlan?(
            <div>
              <button className="btn ghost" style={{fontSize:12,padding:"7px 12px",marginBottom:14}} onClick={()=>setEditPlan(null)}>← Volver a planes</button>
              <div className="card" style={{marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{editPlan.name}</div>
                <div style={{fontSize:12,color:"#475569"}}>{editPlan.category} · {editPlan.duration_weeks} semanas</div>
              </div>
              {(editPlan.plan_days||[]).sort((a,b)=>a.day_number-b.day_number).map(day=>(
                <div key={day.id} className="card" style={{marginBottom:10}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#38bdf8",marginBottom:10}}>{day.day_name||`Día ${day.day_number}`}</div>
                  {(day.plan_exercises||[]).sort((a,b)=>a.order_index-b.order_index).map(pe=>(
                    <div key={pe.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #0d1520"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{pe.exercise_name}</div>
                        <div style={{fontSize:11,color:"#475569"}}>{pe.sets} series × {pe.reps} · {pe.rest_seconds}s descanso</div>
                      </div>
                      <button className="btn danger" style={{fontSize:10,padding:"3px 7px"}} onClick={()=>removeEx(pe.id)}>✕</button>
                    </div>
                  ))}
                  <div style={{marginTop:10}}>
                    <select className="inp" style={{appearance:"none",fontSize:12}} onChange={e=>{
                      const ex = exercises.find(x=>x.id===e.target.value);
                      if(ex) addExToDay(day.id,ex.id,ex.name);
                      e.target.value="";
                    }}>
                      <option value="">+ Añadir ejercicio...</option>
                      {exercises.map(e=><option key={e.id} value={e.id}>{e.name} ({e.category})</option>)}
                    </select>
                  </div>
                </div>
              ))}
              <button className="btn ghost" style={{width:"100%",padding:10,fontSize:12,marginTop:4}} onClick={()=>addDay(editPlan.id)}>+ Añadir día</button>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {plans.map(plan=>(
                <div key={plan.id} className="card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{plan.name}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:2}}>{plan.category} · {plan.duration_weeks} sem · {(plan.plan_days||[]).length} días</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn sky" style={{fontSize:11,padding:"5px 9px"}} onClick={()=>setEditPlan(plan)}>✏️</button>
                      <button className="btn grn" style={{fontSize:11,padding:"5px 9px"}} onClick={()=>setShowAssign(plan.id)}>👥</button>
                      <button className="btn danger" style={{fontSize:10,padding:"5px 8px"}} onClick={()=>deletePlan(plan.id)}>🗑</button>
                    </div>
                  </div>
                  {plan.description&&<div style={{fontSize:12,color:"#334155"}}>{plan.description}</div>}
                </div>
              ))}
              {plans.length===0&&<div className="card" style={{textAlign:"center",padding:32,color:"#334155"}}>Sin planes creados aún</div>}
            </div>
          )}
        </div>
      )}

      {tab==="assign"&&(
        <div>
          <h2 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Planes asignados</h2>
          {clients.map(c=>{
            const cp = clientPlans.filter(x=>x.client_id===c.id&&x.active);
            return(
              <div key={c.id} className="card" style={{marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:cp.length>0?10:0}}>
                  <div className="ring" style={{width:34,height:34,background:c.color+"20",color:c.color,fontSize:11}}>{ini(c.name)}</div>
                  <div style={{flex:1,fontWeight:600,fontSize:13}}>{c.name}</div>
                  <button className="btn sky" style={{fontSize:11,padding:"5px 9px"}} onClick={()=>{setShowAssign("new");setAssignClient(c.id);}}>+ Plan</button>
                </div>
                {cp.map(a=>{
                  const plan=plans.find(p=>p.id===a.plan_id);
                  return plan?(
                    <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderTop:"1px solid #0d1520"}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600}}>{plan.name}</div>
                        <div style={{fontSize:10,color:"#475569"}}>Desde {a.start_date}</div>
                      </div>
                      <button className="btn danger" style={{fontSize:10,padding:"3px 7px"}} onClick={async()=>{
                        await sb.from("client_plans").delete().eq("id",a.id);
                        await loadAll();
                        notify("Plan desasignado");
                      }}>✕</button>
                    </div>
                  ):null;
                })}
              </div>
            );
          })}
        </div>
      )}

      {showNewPlan&&(
        <div className="ovl" onClick={()=>setShowNewPlan(false)}>
          <div className="mdl fade" onClick={e=>e.stopPropagation()}>
            <h2 className="mono" style={{fontSize:17,fontWeight:700,marginBottom:18}}>Nuevo plan</h2>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><span className="lbl">NOMBRE *</span><input className="inp" placeholder="Ej. Plan Fuerza 4 semanas" value={np.name} onChange={e=>setNp(v=>({...v,name:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><span className="lbl">CATEGORÍA</span>
                  <select className="inp" style={{appearance:"none"}} value={np.category} onChange={e=>setNp(v=>({...v,category:e.target.value}))}>
                    {["Fuerza","Cardio","HIIT","Funcional","Movilidad","Mixto"].map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div><span className="lbl">SEMANAS</span><input type="number" className="inp" value={np.duration_weeks} onChange={e=>setNp(v=>({...v,duration_weeks:parseInt(e.target.value)}))}/></div>
              </div>
              <div><span className="lbl">DESCRIPCIÓN</span><textarea className="inp" rows={2} style={{resize:"none"}} value={np.description} onChange={e=>setNp(v=>({...v,description:e.target.value}))}/></div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn sky" style={{flex:1,padding:11}} onClick={createPlan}>Crear plan</button>
                <button className="btn ghost" style={{flex:1,padding:11}} onClick={()=>setShowNewPlan(false)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {showAssign&&showAssign!=="new"&&(
        <div className="ovl" onClick={()=>setShowAssign(null)}>
          <div className="mdl fade" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
            <h2 className="mono" style={{fontSize:17,fontWeight:700,marginBottom:18}}>Asignar plan</h2>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div><span className="lbl">CLIENTE</span>
                <select className="inp" style={{appearance:"none"}} value={assignClient} onChange={e=>setAssignClient(e.target.value)}>
                  <option value="">Seleccionar...</option>
                  {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn sky" style={{flex:1,padding:11}} onClick={()=>assignPlan(showAssign)}>Asignar</button>
                <button className="btn ghost" style={{flex:1,padding:11}} onClick={()=>setShowAssign(null)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {showAssign==="new"&&assignClient&&(
        <div className="ovl" onClick={()=>{setShowAssign(null);setAssignClient("");}}>
          <div className="mdl fade" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
            <h2 className="mono" style={{fontSize:17,fontWeight:700,marginBottom:18}}>Asignar plan a {clients.find(c=>c.id===assignClient)?.name}</h2>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {plans.map(plan=>(
                <button key={plan.id} className="btn ghost" style={{textAlign:"left",padding:12}} onClick={()=>assignPlan(plan.id)}>
                  <div style={{fontWeight:700}}>{plan.name}</div>
                  <div style={{fontSize:11,color:"#475569"}}>{plan.category} · {plan.duration_weeks} semanas</div>
                </button>
              ))}
              {plans.length===0&&<p style={{fontSize:13,color:"#334155"}}>Crea un plan primero</p>}
              <button className="btn ghost" style={{padding:10}} onClick={()=>{setShowAssign(null);setAssignClient("");}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PROGRESS TAB ──────────────────────────────────────────────────────────
function ProgressTab({client, myProgress, myRecords, myAchievements, exercises, loadAll, notify}) {
  const [view, setView] = React.useState("stats");
  const [showLog, setShowLog] = React.useState(false);
  const [showPR, setShowPR] = React.useState(false);
  const [log, setLog] = React.useState({date:TODAY,weight:"",body_fat:"",waist:"",notes:""});
  const [pr, setPr] = React.useState({exercise_id:"",exercise_name:"",value:"",unit:"kg",date:TODAY,notes:""});
  const [saving, setSaving] = React.useState(false);

  const latest = myProgress[0];
  const prev = myProgress[1];

  const saveLog = async() => {
    if(!log.weight&&!log.waist) return notify("Introduce al menos un dato","err");
    setSaving(true);
    await sb.from("progress").insert({...log,client_id:client.id,weight:log.weight||null,body_fat:log.body_fat||null,waist:log.waist||null});
    // Check achievements
    if(myProgress.length===0) {
      await sb.from("achievements").insert({client_id:client.id,type:"first_log",title:"Primera medición",description:"Registraste tu primer dato de progreso",emoji:"📊"});
    }
    setLog({date:TODAY,weight:"",body_fat:"",waist:"",notes:""});
    setShowLog(false);
    await loadAll();
    setSaving(false);
    notify("Progreso registrado ✓");
  };

  const savePR = async() => {
    if(!pr.exercise_name||!pr.value) return notify("Completa los campos","err");
    setSaving(true);
    await sb.from("personal_records").insert({...pr,client_id:client.id,value:parseFloat(pr.value)});
    // Check PR achievement
    if(myRecords.length===0) {
      await sb.from("achievements").insert({client_id:client.id,type:"first_pr",title:"Primera marca personal",description:"Registraste tu primer récord personal",emoji:"🏆"});
    }
    setPr({exercise_id:"",exercise_name:"",value:"",unit:"kg",date:TODAY,notes:""});
    setShowPR(false);
    await loadAll();
    setSaving(false);
    notify("¡Nueva marca personal! 🏆");
  };

  const diff = (field) => {
    if(!latest||!prev||!latest[field]||!prev[field]) return null;
    const d = parseFloat(latest[field]) - parseFloat(prev[field]);
    return d;
  };

  const StatCard = ({label,value,unit,diffVal}) => (
    <div className="stat-box">
      <div className="mono" style={{fontSize:18,fontWeight:700,color:"#e2e8f0"}}>{value||"—"}<span style={{fontSize:11,color:"#475569",marginLeft:2}}>{value?unit:""}</span></div>
      {diffVal!==null&&diffVal!==undefined&&<div style={{fontSize:10,color:diffVal>0?"#f87171":"#4ade80",marginTop:2}}>{diffVal>0?"+":""}{diffVal?.toFixed(1)}</div>}
      <div style={{fontSize:9,color:"#334155",fontWeight:700,marginTop:3}}>{label.toUpperCase()}</div>
    </div>
  );

  const ACHIEVEMENT_LIST = [
    {type:"first_log",emoji:"📊",title:"Primera medición"},
    {type:"first_pr",emoji:"🏆",title:"Primera marca"},
    {type:"sessions_10",emoji:"💪",title:"10 sesiones"},
    {type:"sessions_25",emoji:"🔥",title:"25 sesiones"},
    {type:"streak_4",emoji:"⚡",title:"Racha 4 semanas"},
  ];

  return(
    <div>
      <div className="seg" style={{marginBottom:14}}>
        {[["stats","📊 Medidas"],["records","🏆 Marcas"],["badges","🎖 Logros"]].map(([id,label])=>(
          <button key={id} className={"sb"+(view===id?" on":"")} onClick={()=>setView(id)} style={{fontSize:12}}>{label}</button>
        ))}
      </div>

      {view==="stats"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <button className="btn sky" style={{flex:1,padding:10,fontSize:12}} onClick={()=>setShowLog(true)}>+ Registrar medidas</button>
          </div>
          {latest?(
            <div>
              <div style={{fontSize:10,color:"#334155",fontWeight:700,marginBottom:10}}>ÚLTIMA MEDICIÓN — {latest.date}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
                <StatCard label="Peso" value={latest.weight} unit="kg" diffVal={diff("weight")}/>
                <StatCard label="% Grasa" value={latest.body_fat} unit="%" diffVal={diff("body_fat")}/>
                <StatCard label="Cintura" value={latest.waist} unit="cm" diffVal={diff("waist")}/>
              </div>
              {latest.notes&&<div style={{fontSize:12,color:"#475569",padding:"10px 12px",background:"#080d14",borderRadius:10,marginBottom:14}}>{latest.notes}</div>}
              <div style={{fontSize:10,color:"#334155",fontWeight:700,marginBottom:10}}>HISTORIAL</div>
              {myProgress.map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #0d1520",fontSize:12}}>
                  <span style={{color:"#64748b"}}>{p.date}</span>
                  <span>{p.weight?`${p.weight}kg`:""} {p.body_fat?`${p.body_fat}%`:""} {p.waist?`${p.waist}cm`:""}</span>
                </div>
              ))}
            </div>
          ):(
            <div className="card" style={{textAlign:"center",padding:36}}>
              <div style={{fontSize:28,marginBottom:8}}>📊</div>
              <div style={{color:"#475569",fontSize:13,marginBottom:14}}>Sin mediciones aún. ¡Empieza hoy!</div>
              <button className="btn sky" style={{padding:"10px 20px"}} onClick={()=>setShowLog(true)}>Registrar primera medición</button>
            </div>
          )}
        </div>
      )}

      {view==="records"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <button className="btn sky" style={{flex:1,padding:10,fontSize:12}} onClick={()=>setShowPR(true)}>+ Nueva marca personal</button>
          </div>
          {myRecords.length===0
            ?<div className="card" style={{textAlign:"center",padding:36}}>
              <div style={{fontSize:28,marginBottom:8}}>🏆</div>
              <div style={{color:"#475569",fontSize:13}}>Aún no tienes marcas registradas</div>
            </div>
            :<div>
              {Object.entries(myRecords.reduce((acc,r)=>{
                if(!acc[r.exercise_name]) acc[r.exercise_name]=[];
                acc[r.exercise_name].push(r);
                return acc;
              },{})).map(([name,recs])=>{
                const best = recs.sort((a,b)=>b.value-a.value)[0];
                return(
                  <div key={name} className="card" style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14}}>{name}</div>
                        <div style={{fontSize:11,color:"#475569",marginTop:2}}>{recs.length} registros · Mejor: <span style={{color:"#facc15",fontWeight:700}}>{best.value}{best.unit}</span></div>
                      </div>
                      <div className="mono" style={{fontSize:20,fontWeight:700,color:"#facc15"}}>{best.value}<span style={{fontSize:11}}>{best.unit}</span></div>
                    </div>
                    <div style={{marginTop:8}}>
                      {recs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3).map(r=>(
                        <div key={r.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 0",borderTop:"1px solid #0d1520",color:"#64748b"}}>
                          <span>{r.date}</span><span style={{fontWeight:600,color:"#e2e8f0"}}>{r.value}{r.unit}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}

      {view==="badges"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {ACHIEVEMENT_LIST.map(a=>{
              const earned = myAchievements.find(x=>x.type===a.type);
              return(
                <div key={a.type} className="card" style={{textAlign:"center",padding:16,opacity:earned?1:0.35,border:earned?"1px solid #1e3a5a":"1px solid var(--border)"}}>
                  <div style={{fontSize:30,marginBottom:6}}>{a.emoji}</div>
                  <div style={{fontSize:12,fontWeight:700,color:earned?"#e2e8f0":"#334155"}}>{a.title}</div>
                  {earned&&<div style={{fontSize:10,color:"#334155",marginTop:4}}>{new Date(earned.earned_at).toLocaleDateString("es-ES",{day:"numeric",month:"short"})}</div>}
                  {!earned&&<div style={{fontSize:10,color:"#1e293b",marginTop:4}}>Por conseguir</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {showLog&&(
        <div className="ovl" onClick={()=>setShowLog(false)}>
          <div className="mdl fade" onClick={e=>e.stopPropagation()}>
            <h2 className="mono" style={{fontSize:17,fontWeight:700,marginBottom:18}}>Registrar medidas</h2>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><span className="lbl">FECHA</span><input type="date" className="inp" value={log.date} onChange={e=>setLog(v=>({...v,date:e.target.value}))}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><span className="lbl">PESO (kg)</span><input type="number" className="inp" placeholder="75.5" value={log.weight} onChange={e=>setLog(v=>({...v,weight:e.target.value}))}/></div>
                <div><span className="lbl">% GRASA</span><input type="number" className="inp" placeholder="18.5" value={log.body_fat} onChange={e=>setLog(v=>({...v,body_fat:e.target.value}))}/></div>
                <div><span className="lbl">CINTURA (cm)</span><input type="number" className="inp" placeholder="80" value={log.waist} onChange={e=>setLog(v=>({...v,waist:e.target.value}))}/></div>
                <div><span className="lbl">MASA MUSCULAR (kg)</span><input type="number" className="inp" placeholder="35" value={log.muscle_mass||""} onChange={e=>setLog(v=>({...v,muscle_mass:e.target.value}))}/></div>
              </div>
              <div><span className="lbl">NOTAS</span><input className="inp" placeholder="Cómo me siento..." value={log.notes} onChange={e=>setLog(v=>({...v,notes:e.target.value}))}/></div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn sky" style={{flex:1,padding:11}} onClick={saveLog} disabled={saving}>{saving?"Guardando...":"Guardar"}</button>
                <button className="btn ghost" style={{flex:1,padding:11}} onClick={()=>setShowLog(false)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {showPR&&(
        <div className="ovl" onClick={()=>setShowPR(false)}>
          <div className="mdl fade" onClick={e=>e.stopPropagation()}>
            <h2 className="mono" style={{fontSize:17,fontWeight:700,marginBottom:18}}>🏆 Nueva marca personal</h2>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div><span className="lbl">EJERCICIO</span>
                <select className="inp" style={{appearance:"none"}} value={pr.exercise_id} onChange={e=>{
                  const ex=exercises.find(x=>x.id===e.target.value);
                  setPr(v=>({...v,exercise_id:e.target.value,exercise_name:ex?.name||""}));
                }}>
                  <option value="">Seleccionar ejercicio...</option>
                  {exercises.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                </select>
                <input className="inp" placeholder="O escribe el nombre" style={{marginTop:6}} value={pr.exercise_name} onChange={e=>setPr(v=>({...v,exercise_name:e.target.value}))}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10}}>
                <div><span className="lbl">MARCA</span><input type="number" className="inp" placeholder="100" value={pr.value} onChange={e=>setPr(v=>({...v,value:e.target.value}))}/></div>
                <div><span className="lbl">UNIDAD</span>
                  <select className="inp" style={{appearance:"none"}} value={pr.unit} onChange={e=>setPr(v=>({...v,unit:e.target.value}))}>
                    {["kg","reps","seg","min","km","m"].map(u=><option key={u}>{u}</option>)}
                  </select>
                </div>
              </div>
              <div><span className="lbl">FECHA</span><input type="date" className="inp" value={pr.date} onChange={e=>setPr(v=>({...v,date:e.target.value}))}/></div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn sky" style={{flex:1,padding:11}} onClick={savePR} disabled={saving}>{saving?"Guardando...":"Guardar marca 🏆"}</button>
                <button className="btn ghost" style={{flex:1,padding:11}} onClick={()=>setShowPR(false)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PLAN TAB ───────────────────────────────────────────────────────────────
function PlanTab({client, plans, clientPlans, exercises}) {
  const myActivePlans = clientPlans.filter(cp=>cp.client_id===client.id&&cp.active);

  if(myActivePlans.length===0) return(
    <div className="card" style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:30,marginBottom:10}}>📋</div>
      <div style={{color:"#475569",fontSize:13,marginBottom:6}}>No tienes ningún plan asignado</div>
      <div style={{fontSize:12,color:"#334155"}}>Tu trainer te asignará un plan de entrenamiento pronto</div>
    </div>
  );

  return(
    <div>
      {myActivePlans.map(cp=>{
        const plan = plans.find(p=>p.id===cp.plan_id);
        if(!plan) return null;
        return(
          <div key={cp.id}>
            <div className="hero-card" style={{marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:16,marginBottom:4}}>{plan.name}</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>{plan.category} · {plan.duration_weeks} semanas · Inicio: {cp.start_date}</div>
              {plan.description&&<div style={{fontSize:13,color:"#94a3b8"}}>{plan.description}</div>}
            </div>
            {(plan.plan_days||[]).sort((a,b)=>a.day_number-b.day_number).map(day=>(
              <div key={day.id} className="card" style={{marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:14,color:"#38bdf8",marginBottom:12}}>{day.day_name||`Día ${day.day_number}`}</div>
                {(day.plan_exercises||[]).sort((a,b)=>a.order_index-b.order_index).map((pe,i)=>{
                  const ex = exercises.find(e=>e.id===pe.exercise_id);
                  return(
                    <div key={pe.id} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:i<day.plan_exercises.length-1?"1px solid #0d1520":"none",alignItems:"flex-start"}}>
                      <div style={{minWidth:24,height:24,borderRadius:6,background:"#0c2040",color:"#38bdf8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:14}}>{pe.exercise_name}</div>
                        <div style={{display:"flex",gap:12,marginTop:4}}>
                          <span style={{fontSize:12,color:"#38bdf8",fontWeight:700}}>{pe.sets} × {pe.reps}</span>
                          {pe.rest_seconds&&<span style={{fontSize:11,color:"#475569"}}>⏱ {pe.rest_seconds}s</span>}
                        </div>
                        {ex?.muscle_group&&<div style={{fontSize:10,color:"#334155",marginTop:2}}>{ex.muscle_group}</div>}
                        {pe.notes&&<div style={{fontSize:11,color:"#475569",marginTop:4,fontStyle:"italic"}}>{pe.notes}</div>}
                        {ex?.description&&<div style={{fontSize:11,color:"#1e3a5a",marginTop:4,lineHeight:1.4}}>{ex.description}</div>}
                      </div>
                    </div>
                  );
                })}
                {(day.plan_exercises||[]).length===0&&<div style={{fontSize:12,color:"#1e293b"}}>Sin ejercicios asignados</div>}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>

  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js')

      .catch(function(e){ console.log('SW err', e); });

}
