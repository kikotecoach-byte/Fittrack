<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#05080f;--card:#0f1520;--border:#1a2235;--border2:#243048;--text:#e8edf5;--muted:#4a5568;
  --sky:#0ea5e9;--green:#10b981;--amber:#f59e0b;--red:#ef4444;}
html{background:#05080f;}body{background:#05080f;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
.fade{animation:fadeUp .25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─ NAV sidebar → bottom on mobile ─ */
.nav{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:11px;cursor:pointer;
  font-size:13px;font-weight:600;color:#4a5568;border:none;background:none;width:100%;text-align:left;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;}
.nav:hover,.nav:active{background:#0f1520;color:#94a3b8;}
.nav.on{background:linear-gradient(135deg,#0c1d35,#0a1829);color:var(--sky);border:1px solid #0e3a5c;}

/* ─ Sidebar: hidden on mobile, visible on desktop ─ */
.sidebar{width:200px;flex-shrink:0;padding:22px 10px;display:flex;flex-direction:column;
  gap:3px;border-right:1px solid #0d1520;position:sticky;top:0;height:100vh;overflow:auto;}

/* ─ Bottom nav: visible on mobile only ─ */
.bottom-nav{display:none;}

@media(max-width:640px){
  /* Hide sidebar */
  .sidebar{display:none !important;}

  /* Show bottom nav */
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:#080d14;border-top:1px solid #1a2235;
    align-items:center;justify-content:space-around;
    padding:6px 0 calc(6px + env(safe-area-inset-bottom));
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .bnav-btn{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:4px 8px;border:none;background:none;cursor:pointer;
    color:#4a5568;font-family:'Plus Jakarta Sans',sans-serif;
    font-size:10px;font-weight:600;border-radius:8px;
    -webkit-tap-highlight-color:transparent;min-width:48px;
  }
  .bnav-btn.on{color:var(--sky);}
  .bnav-icon{font-size:22px;line-height:1.2;position:relative;display:inline-block;}
  .bnav-badge{position:absolute;top:-3px;right:-6px;background:#ef4444;color:#fff;
    border-radius:10px;font-size:9px;font-weight:700;padding:1px 4px;min-width:15px;text-align:center;}

  /* Main content padding for bottom nav */
  .admin-content{
    padding-bottom:calc(70px + env(safe-area-inset-bottom)) !important;
  }

  /* Modals slide up from bottom */
  .ovl{align-items:flex-end !important;}
  .mdl{border-radius:20px 20px 0 0 !important;
    padding-bottom:calc(24px + env(safe-area-inset-bottom)) !important;}
  .mdl::before{content:'';display:block;width:36px;height:4px;
    background:#1e293b;border-radius:2px;margin:0 auto 16px;}

  /* Cards full width */
  .clients-grid{grid-template-columns:1fr !important;}
  .stats-grid{grid-template-columns:repeat(3,1fr) !important;gap:8px !important;}
  .dash-grid{grid-template-columns:1fr !important;}
  .income-grid{grid-template-columns:1fr 1fr !important;}

  /* Inputs larger for touch */
  .inp{font-size:16px !important;padding:12px 14px !important;}

  /* Top bar on mobile */
  .mobile-topbar{
    display:flex !important;align-items:center;justify-content:space-between;
    padding:12px 14px;border-bottom:1px solid #0d1520;
    background:var(--bg);position:sticky;top:0;z-index:50;
  }
}

@media(min-width:641px){
  .mobile-topbar{display:none;}
  .bottom-nav{display:none;}
  .bnav-btn{display:none;}
}

/* ─ Shared components ─ */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;}
.btn{border:none;border-radius:9px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;font-size:13px;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.sky{background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;padding:9px 16px;}
.sky:active{opacity:.8;}
.grn{background:linear-gradient(135deg,#065f46,#059669);color:#fff;padding:9px 16px;}
.grn:active{opacity:.8;}
.ghost{background:#111827;color:#64748b;padding:9px 14px;border:1px solid var(--border);}
.ghost:active{opacity:.8;}
.danger{background:#160404;color:#f87171;padding:7px 11px;border:1px solid #3f0f0f;}
.wa{background:linear-gradient(135deg,#14532d,#16a34a);color:#fff;padding:8px 13px;
  display:inline-flex;align-items:center;gap:6px;}
.wa:active{opacity:.8;}
.inp{background:#080d14;border:1px solid var(--border2);border-radius:9px;padding:9px 13px;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;width:100%;
  outline:none;transition:border .2s;-webkit-appearance:none;}
.inp:focus{border-color:var(--sky);}
.inp option{background:#0d1117;}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.mdl{background:#0c1220;border-radius:20px;border:1px solid var(--border2);padding:26px;
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.pbar{height:6px;background:#111827;border-radius:10px;overflow:hidden;}
.pfill{height:100%;border-radius:10px;transition:width .6s;}
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:400;
  padding:12px 20px;border-radius:24px;font-size:13px;font-weight:600;
  animation:slideIn .3s ease;white-space:nowrap;}
@keyframes slideIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.seg{display:flex;background:#080d14;border-radius:10px;padding:3px;gap:2px;}
.sb{flex:1;padding:8px 6px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;
  transition:all .2s;color:#4a5568;background:none;}
.sb.on{background:#0f1829;color:var(--sky);}
.tab{padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;
  border:none;background:none;transition:all .18s;color:#4a5568;
  font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;}
.tab.on{background:#0f1520;color:var(--sky);border:1px solid #0e3a5c;}
.ring{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;flex-shrink:0;}
.mono{font-family:'JetBrains Mono',monospace;}
.lbl{font-size:11px;color:#4a5568;display:block;margin-bottom:5px;font-weight:700;letter-spacing:.8px;}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.hero-card{background:linear-gradient(135deg,#090f1e,#0d1830);border-radius:20px;
  border:1px solid #1e3a5a;padding:22px;position:relative;overflow:hidden;}
.hero-card::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;
  border-radius:50%;background:radial-gradient(circle,#0ea5e912,transparent 70%);}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.cal-day{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:13px;font-weight:600;
  transition:all .15s;border:1px solid transparent;}
.cal-day:active{opacity:.7;}
.cal-day.has-session{background:#0c2040;border-color:#1e3a5a;color:#38bdf8;}
.cal-day.today{border-color:#0ea5e9;color:#0ea5e9;}
.cal-day.blocked{background:#1a0808;color:#4a1515;}
.cal-day.other-month{opacity:.25;}
.streak-fire{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
</style>
</head>

<script type="text/babel">

// ── REMEMBER ME ────────────────────────────────────────────────────────────
function saveSession(type, data) {
  try { localStorage.setItem("kg_session", JSON.stringify({type, data, ts: Date.now()})); } catch(e){}
}
function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem("kg_session")||"null");
    if(!s) return null;
    // Expire after 30 days
    if(Date.now() - s.ts > 30*24*60*60*1000) { localStorage.removeItem("kg_session"); return null; }
    return s;
  } catch(e){ return null; }
}
function clearSession() {
  try { localStorage.removeItem("kg_session"); } catch(e){}
}
const GYM_NAME = "Kikote Gym";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TODAY = new Date().toISOString().split("T")[0];
const TIME_SLOTS = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00"];

const fmtDate = d => new Date(d+"T12:00:00").toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short"});
const fmtLong = d => new Date(d+"T12:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
const fmtMonth = d => new Date(d+"T12:00:00").toLocaleDateString("es-ES",{month:"long",year:"numeric"});

const getWeekDays = (from=TODAY) => Array.from({length:7},(_,i)=>{const d=new Date(from+"T12:00:00");d.setDate(d.getDate()+i);return d.toISOString().split("T")[0];});

function getMonthDays(year, month) {
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  const prev = new Date(year, month, 0).getDate();
  const cells = [];
  for(let i=(first===0?6:first-1); i>0; i--) cells.push({day:prev-i+1,cur:false});
  for(let i=1; i<=days; i++) cells.push({day:i,cur:true});
  while(cells.length%7!==0) cells.push({day:cells.length-days-(first===0?6:first-1)+1,cur:false});
  return cells;
}

function calcStreak(history) {
  if(!history.length) return 0;
  const dates = [...new Set(history.map(h=>h.date))].sort((a,b)=>b.localeCompare(a));
  let streak = 0, prev = null;
  for(const d of dates) {
    if(!prev) { streak=1; prev=d; continue; }
    const diff = Math.round((new Date(prev+"T12:00:00") - new Date(d+"T12:00:00")) / 86400000);
    if(diff<=7) { streak++; prev=d; } else break;
  }
  return streak;
}

// ── ROOT ───────────────────────────────────────────────────────────────────
function App() {
  const [mode, setMode] = React.useState("login");
  const [clients, setClients] = React.useState([]);
  const [sessions, setSessions] = React.useState([]);
  const [history, setHistory] = React.useState([]);
  const [payments, setPayments] = React.useState([]);
  const [blocked, setBlocked] = React.useState([]);
  const [forum, setForum] = React.useState([]);
  const [exercises, setExercises] = React.useState([]);
  const [plans, setPlans] = React.useState([]);
  const [clientPlans, setClientPlans] = React.useState([]);
  const [progress, setProgress] = React.useState([]);
  const [records, setRecords] = React.useState([]);
  const [achievements, setAchievements] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [loggedClient, setLoggedClient] = React.useState(null);
  const [pendingSession, setPendingSession] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [loginTab, setLoginTab] = React.useState("client");
  const [loginName, setLoginName] = React.useState("");
  const [loginCode, setLoginCode] = React.useState("");
  const [adminPass, setAdminPass] = React.useState("");
  const [loginErr, setLoginErr] = React.useState("");

  const notify = React.useCallback((msg, type="ok") => {
    setToast({msg,type}); setTimeout(()=>setToast(null),3200);
  },[]);

  const loadAll = React.useCallback(async () => {
    try {
      const [c,s,h,p,b,f,ex,pl,cp,pr,rec,ach] = await Promise.all([
        sb.from("clients").select("*").order("created_at"),
        sb.from("sessions").select("*").order("date").order("time"),
        sb.from("history").select("*").order("date",{ascending:false}),
        sb.from("payments").select("*").order("paid_at",{ascending:false}),
        sb.from("blocked_slots").select("*"),
        sb.from("forum_posts").select("*").order("created_at",{ascending:false}),
        sb.from("exercises").select("*").order("category").order("name"),
        sb.from("training_plans").select("*, plan_days(*, plan_exercises(*))").order("created_at",{ascending:false}),
        sb.from("client_plans").select("*"),
        sb.from("progress").select("*").order("date",{ascending:false}),
        sb.from("personal_records").select("*").order("date",{ascending:false}),
        sb.from("achievements").select("*").order("earned_at",{ascending:false}),
      ]);
      setClients(c.data||[]); setSessions(s.data||[]); setHistory(h.data||[]);
      setPayments(p.data||[]); setBlocked(b.data||[]); setForum(f.data||[]);
      setExercises(ex.data||[]); setPlans(pl.data||[]); setClientPlans(cp.data||[]);
      setProgress(pr.data||[]); setRecords(rec.data||[]); setAchievements(ach.data||[]);
    } catch(e) { notify("Error de conexión","err"); }
    setLoading(false);
  },[]);

  React.useEffect(()=>{
    loadAll().then(()=>{
      // Restore saved session
      const s = loadSession();
      if(s) setPendingSession(s);
    });
  },[]);

  // Apply pending session once clients are loaded
  React.useEffect(()=>{
    if(pendingSession && clients.length > 0) {
      if(pendingSession.type === "admin") {
        setMode("admin");
      } else if(pendingSession.type === "client") {
        const c = clients.find(x=>x.id===pendingSession.data.id);
        if(c) { setLoggedClient(c); setMode("client"); }
      }
      setPendingSession(null);
    }
  },[pendingSession, clients]);

  React.useEffect(()=>{
    if(loggedClient) { const u=clients.find(c=>c.id===loggedClient.id); if(u) setLoggedClient(u); }
  },[clients]);

  const handleClientLogin = (remember) => {
    const c = clients.find(x=>x.name.toLowerCase().trim()===loginName.toLowerCase().trim()&&x.code===loginCode.trim());
    if(c){
      setLoggedClient(c);setMode("client");setLoginErr("");
      if(remember) saveSession("client", {id:c.id});
    }
    else setLoginErr("Nombre o código incorrecto");
  };
  const handleAdminLogin = (remember) => {
    if(adminPass===ADMIN_PASS){
      setMode("admin");setAdminPass("");setLoginErr("");
      if(remember) saveSession("admin", {});
    }
    else setLoginErr("Contraseña incorrecta");
  };

  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div className="mono" style={{fontSize:32,color:"#0ea5e9"}}>⚡</div>

    </div>
  );

    <div>
      {toast&&<div className="notif" style={{background:toast.type==="err"?"#160404":toast.type==="wa"?"#052e16":"#060f1e",color:toast.type==="err"?"#f87171":toast.type==="wa"?"#4ade80":"#38bdf8",border:`1px solid ${toast.type==="err"?"#450a0a":toast.type==="wa"?"#14532d":"#0e3a5c"}`}}>{toast.msg}</div>}
      {mode==="login"&&<LoginScreen {...{loginTab,setLoginTab,loginName,setLoginName,loginCode,setLoginCode,adminPass,setAdminPass,loginErr,setLoginErr,handleClientLogin,handleAdminLogin}}/>}
      {mode==="admin"&&<AdminPanel {...{clients,sessions,history,payments,blocked,forum,exercises,plans,clientPlans,progress,records,achievements,loadAll,notify}} onLogout={()=>{clearSession();setMode("login");}}/>}
      {mode==="client"&&loggedClient&&<ClientPortal client={loggedClient} allSessions={sessions} allHistory={history} allClients={clients} blocked={blocked} forum={forum} exercises={exercises} plans={plans} clientPlans={clientPlans} myProgress={progress.filter(p=>p.client_id===loggedClient.id)} myRecords={records.filter(r=>r.client_id===loggedClient.id)} myAchievements={achievements.filter(a=>a.client_id===loggedClient.id)} loadAll={loadAll} notify={notify} onLogout={()=>{clearSession();setLoggedClient(null);setMode("login");}}/>}
    </div>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function LoginScreen({loginTab,setLoginTab,loginName,setLoginName,loginCode,setLoginCode,adminPass,setAdminPass,loginErr,setLoginErr,handleClientLogin,handleAdminLogin}) {
  const [remember, setRemember] = React.useState(true);
  const RememberBox = ({id}) => (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"2px 0"}}>

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"radial-gradient(ellipse at 50% 0%,#0c1d35,#05080f 60%)"}}>
      <div style={{width:"100%",maxWidth:380}} className="fade">
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:38,marginBottom:8}}>🏋️</div>
          <div className="mono" style={{fontSize:28,fontWeight:700,color:"#0ea5e9",letterSpacing:-1}}>{GYM_NAME}</div>
          <div style={{color:"#334155",fontSize:13,marginTop:5}}>Tu centro de entrenamiento personal</div>
        </div>
        <div className="seg" style={{marginBottom:20}}>
          <button className={`sb ${loginTab==="client"?"on":""}`} onClick={()=>{setLoginTab("client");setLoginErr("");}}>Soy cliente</button>
          <button className={`sb ${loginTab==="admin"?"on":""}`} onClick={()=>{setLoginTab("admin");setLoginErr("");}}>Admin</button>
        </div>
        <div className="card" style={{padding:26}}>
          {loginTab==="client"?(
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <p style={{fontSize:13,color:"#475569",marginBottom:4}}>Ingresa tu nombre y el código de acceso.</p>
              <div><span className="lbl">NOMBRE COMPLETO</span>
                <input className="inp" placeholder="Ej. Carlos Mendoza" value={loginName} onChange={e=>setLoginName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleClientLogin(remember)}/>
              </div>
              <div><span className="lbl">CÓDIGO</span>
                <input className="inp mono" placeholder="••••" maxLength={4} value={loginCode} onChange={e=>setLoginCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleClientLogin(remember)} style={{letterSpacing:8,fontSize:20,textAlign:"center"}}/>
              </div>
              {loginErr&&<p style={{fontSize:12,color:"#f87171"}}>{loginErr}</p>}
              <RememberBox id="remC"/>
              <button className="btn sky" style={{width:"100%",padding:13,fontSize:14}} onClick={()=>handleClientLogin(remember)}>Entrar a mi portal</button>
              <p style={{fontSize:11,color:"#1e3a5a",textAlign:"center"}}>¿Sin código? Escribe a tu trainer 📱</p>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div><span className="lbl">CONTRASEÑA</span>
                <input className="inp" type="password" placeholder="••••••••" value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdminLogin(remember)}/>
              </div>
              {loginErr&&<p style={{fontSize:12,color:"#f87171"}}>{loginErr}</p>}
              <RememberBox id="remA"/>
              <button className="btn sky" style={{width:"100%",padding:13,fontSize:14}} onClick={()=>handleAdminLogin(remember)}>Entrar al panel</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ──────────────────────────────────────────────────────────────────
function AdminPanel({clients,sessions,history,payments,blocked,forum,exercises,plans,clientPlans,progress,records,achievements,loadAll,notify,onLogout}) {
  const [view,setView] = React.useState("dashboard");
  const [schedView,setSchedView] = React.useState("week");
  const [showVacation,setShowVacation] = React.useState(false);
  const [expanded,setExpanded] = React.useState(null);
  const [waClient,setWaClient] = React.useState(null);
  const [showBulkWA,setShowBulkWA] = React.useState(false);
  const [showNC,setShowNC] = React.useState(false);
  const [showNS,setShowNS] = React.useState(false);
  const [showPay,setShowPay] = React.useState(null);
  const [saving,setSaving] = React.useState(false);
  const [calDate,setCalDate] = React.useState(new Date());
  const [activeDay,setActiveDay] = React.useState(TODAY);
  const [nc,setNc] = React.useState({name:"",code:"",phone:"",email:"",sessions:10,cost:100,nextPayment:"",welcome:"",notes:""});
  const [ns,setNs] = React.useState({clientId:"",date:TODAY,time:"07:00",type:"Fuerza",confirmed:true});

  const reminders = [];
  clients.forEach(c=>{
    const d=daysUntil(c.next_payment);
    if(d<=5) reminders.push({c,type:"payment",days:d,urgent:d<=2});
    if(c.sessions_left<=2&&c.sessions_left>0) reminders.push({c,type:"sessions",urgent:c.sessions_left<=1});
    if(c.sessions_left===0) reminders.push({c,type:"expired",urgent:true});
  });
  const requests = sessions.filter(s=>s.requested);
  const todaySessions = sessions.filter(s=>s.date===TODAY&&!s.requested);
  const alertCount = reminders.filter(r=>r.urgent).length+requests.length;

  // Income stats
  const thisMonth = new Date().toISOString().slice(0,7);
  const monthIncome = payments.filter(p=>p.paid_at&&p.paid_at.startsWith(thisMonth)).reduce((a,p)=>a+parseFloat(p.amount||0),0);
  const totalIncome = payments.reduce((a,p)=>a+parseFloat(p.amount||0),0);

  const w = async (fn) => { setSaving(true); await fn(); await loadAll(); setSaving(false); };

  const addClient = () => w(async()=>{
    if(!nc.name||!nc.code||!nc.nextPayment) return notify("Completa los campos requeridos","err");
    if(nc.code.length!==4) return notify("El código debe tener 4 dígitos","err");
    if(clients.find(c=>c.code===nc.code)) return notify("Ese código ya existe","err");
    const color=COLORS[clients.length%COLORS.length];
    const {error}=await sb.from("clients").insert({name:nc.name,code:nc.code,phone:nc.phone,email:nc.email,color,sessions_left:parseInt(nc.sessions),total_sessions:parseInt(nc.sessions),next_payment:nc.nextPayment,payment_amount:parseFloat(nc.cost),welcome_msg:nc.welcome,notes:nc.notes});
    if(error) return notify("Error: "+error.message,"err");
    setShowNC(false); setNc({name:"",code:"",phone:"",email:"",sessions:10,cost:100,nextPayment:"",welcome:"",notes:""});
    notify("Cliente añadido ✓");
  });

  const saveNotes = (clientId, notes) => w(async()=>{
    await sb.from("clients").update({notes}).eq("id",clientId);
    notify("Notas guardadas ✓");
  });

  const addSession = () => w(async()=>{
    if(!ns.clientId) return notify("Selecciona un cliente","err");
    const {error}=await sb.from("sessions").insert({client_id:ns.clientId,date:ns.date,time:ns.time,type:ns.type,status:ns.confirmed?"confirmed":"pending",requested:false});
    if(error) return notify("Error: "+error.message,"err");
    setShowNS(false); setNs({clientId:"",date:TODAY,time:"07:00",type:"Fuerza",confirmed:true});
    notify("Sesión agendada ✓");
  });

  const completeSession = (sess) => w(async()=>{
    await sb.from("sessions").delete().eq("id",sess.id);
    await sb.from("history").insert({client_id:sess.client_id,date:sess.date,time:sess.time,type:sess.type});
    const client=clients.find(c=>c.id===sess.client_id);
    if(client) await sb.from("clients").update({sessions_left:Math.max(0,client.sessions_left-1)}).eq("id",client.id);
    notify("Sesión completada ✓");
  });

  const deleteSession = (id) => w(async()=>{ await sb.from("sessions").delete().eq("id",id); notify("Sesión eliminada"); });
  const approveRequest = (id) => w(async()=>{ await sb.from("sessions").update({requested:false,status:"confirmed"}).eq("id",id); notify("Solicitud aprobada ✓"); });
  const denyRequest = (id) => w(async()=>{ await sb.from("sessions").delete().eq("id",id); notify("Solicitud rechazada"); });

  const markPayment = (client, amount) => w(async()=>{
    const next=new Date(client.next_payment+"T12:00:00"); next.setMonth(next.getMonth()+1);
    await sb.from("clients").update({next_payment:next.toISOString().split("T")[0]}).eq("id",client.id);
    await sb.from("payments").insert({client_id:client.id,client_name:client.name,amount:amount||client.payment_amount,paid_at:TODAY});
    setShowPay(null); notify("Pago registrado ✓");
  });

  const renewSessions = (client) => w(async()=>{ await sb.from("clients").update({sessions_left:client.total_sessions}).eq("id",client.id); notify("Sesiones renovadas ✓"); });
  const deleteClient = (id) => w(async()=>{ await sb.from("clients").delete().eq("id",id); setExpanded(null); notify("Cliente eliminado"); });

  const toggleBlockDay = (date) => w(async()=>{
    const ex=blocked.find(b=>b.date===date&&b.time==="ALL");
    if(ex) await sb.from("blocked_slots").delete().eq("id",ex.id);
    else await sb.from("blocked_slots").insert({date,time:"ALL",reason:"Día bloqueado"});
    notify(ex?"Día desbloqueado":"Día bloqueado 🚫");
  });

  const blockVacation = (startDate, endDate, reason="Vacaciones") => w(async()=>{
    const start=new Date(startDate+"T12:00:00");
    const end=new Date(endDate+"T12:00:00");
    const inserts=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split("T")[0];
      const dow=d.getDay();
      if(dow>=1&&dow<=5) inserts.push({date:ds,time:"ALL",reason:"Vacaciones"});
    }
    if(inserts.length>0) await sb.from("blocked_slots").insert(inserts);
    setShowVacation(false);
    const emoji = reason==="Festivo"?"🎉":"🏖";
    notify(`${inserts.length} días marcados como ${reason} ${emoji}`);
  });

  const toggleBlock = (date, time) => w(async()=>{
    const ex=blocked.find(b=>b.date===date&&b.time===time);
    if(ex) await sb.from("blocked_slots").delete().eq("id",ex.id);
    else await sb.from("blocked_slots").insert({date,time});
    notify(ex?"Horario desbloqueado":"Horario bloqueado");
  });

  const isBlocked = (date,time) => blocked.some(b=>b.date===date&&b.time===time);

  // Calendar helpers
  const calYear=calDate.getFullYear(), calMonth=calDate.getMonth();
  const calDays=getMonthDays(calYear,calMonth);
  const getDayStr=(day)=>`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

  const clientsPayingPending = clients.filter(c=>daysUntil(c.next_payment)<=5);
  const clientsLowSessions = clients.filter(c=>c.sessions_left<=2);

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Mobile top bar */}
      <div className="mobile-topbar">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>🏋️</span>
          <span className="mono" style={{fontSize:14,fontWeight:700,color:"#0ea5e9"}}>{GYM_NAME}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn wa" style={{fontSize:11,padding:"7px 11px"}} onClick={()=>setShowBulkWA(true)}>📱</button>
          <button className="btn ghost" style={{fontSize:11,padding:"7px 11px"}} onClick={onLogout}>⏏</button>
        </div>
      </div>

      {/* Secondary nav tabs */}
      {["forum","reminders","income"].includes(view)&&(
        <div style={{display:"flex",gap:6,padding:"8px 14px 0",overflowX:"auto"}}>
          {[["forum","💬 Foro"],["reminders","🔔 Alertas"],["income","💶 Ingresos"]].map(([id,label])=>(
            <button key={id} className={"tab"+(view===id?" on":"")} onClick={()=>setView(id)} style={{flexShrink:0,fontSize:12}}>{label}</button>
          ))}
          <button className={"tab"} onClick={()=>setView("dashboard")} style={{flexShrink:0,fontSize:12,color:"#475569"}}>← Volver</button>
        </div>
      )}

      {/* Bottom navigation - mobile only */}
      <nav className="bottom-nav">
        {[
          {id:"dashboard",icon:"🏠",label:"Inicio"},
          {id:"clients",icon:"👥",label:"Clientes"},
          {id:"schedule",icon:"📅",label:"Agenda"},
          {id:"exercises",icon:"🏋️",label:"Ejercicios"},
          {id:"plans",icon:"📋",label:"Planes"},
        ].map(item=>(
          <button key={item.id} className={"bnav-btn"+(view===item.id?" on":"")} onClick={()=>setView(item.id)}>
            <span className="bnav-icon">
              {item.icon}
              {item.count>0&&<span className="bnav-badge">{item.count}</span>}
            </span>
            <span>{item.label}</span>
          </button>
        ))}
      </nav>

      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#0ea5e9,#4ade80)",zIndex:500}}/>}
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#0ea5e9,#4ade80)",zIndex:500}}/>}


      {/* Content */}
      <div style={{padding:"14px 14px 80px",minHeight:"100vh",background:"#05080f"}} className="fade admin-content">

        {/* DASHBOARD */}
        {view==="dashboard"&&(
          <div>
            <div style={{marginBottom:24}}>
              <h1 className="mono" style={{fontSize:20,fontWeight:700}}>{GYM_NAME} — Dashboard</h1>

                </div>
                {todaySessions.length===0?<p style={{fontSize:12,color:"#1e293b"}}>Sin sesiones hoy</p>
                  :todaySessions.sort((a,b)=>a.time.localeCompare(b.time)).map(s=>{

                    return(
                      <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #0d1520"}}>

              </div>
              <div className="card">
                <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>Solicitudes pendientes</h3>
                {requests.length===0?<p style={{fontSize:12,color:"#1e293b"}}>Sin solicitudes ✓</p>
                  :requests.map(r=>{
                    const c=clients.find(x=>x.id===r.client_id); if(!c) return null;
                    return(
                      <div key={r.id} style={{background:"#080f1e",borderRadius:10,padding:10,marginBottom:8,border:"1px solid #1e3a5a"}}>

                          <div><div style={{fontSize:12,fontWeight:700}}>{c.name}</div><div style={{fontSize:11,color:"#64748b"}}>{r.type} · {fmtDate(r.date)} {r.time}</div></div>
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn grn" style={{flex:1,fontSize:11,padding:"6px 8px"}} onClick={()=>approveRequest(r.id)}>✓ Aprobar</button>
                          <button className="btn danger" style={{flex:1,fontSize:11,padding:"6px 8px"}} onClick={()=>denyRequest(r.id)}>✕ Rechazar</button>

                  })

              </div>
            </div>
          </div>

          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <div><h1 className="mono" style={{fontSize:20,fontWeight:700}}>Clientes</h1><p style={{color:"#334155",fontSize:12,marginTop:3}}>{clients.length} registrados</p></div>
              <button className="btn sky" onClick={()=>setShowNC(true)}>+ Nuevo</button>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div style={{display:"flex",gap:11,alignItems:"center"}}>

              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
                <button className="btn ghost" style={{padding:"6px 10px",fontSize:13,flexShrink:0}} onClick={()=>{
                  const d=new Date(activeDay+"T12:00:00");
                  d.setDate(d.getDate()-(schedView==="week"?7:1));
                  setActiveDay(d.toISOString().split("T")[0]);
                }}>‹</button>
                {schedView==="week"
                  ? getWeekDays(activeDay).map(day=>{
                      const cnt=sessions.filter(s=>s.date===day).length;
                      const isBlk=blocked.some(b=>b.date===day&&b.time==="ALL");
                      return(
                        <button key={day} className={"tab"+(activeDay===day?" on":"")} onClick={()=>setActiveDay(day)}
                          style={{flexShrink:0,opacity:isBlk?0.4:1}}>
                          <div>{fmtDate(day)}</div>
                          {cnt>0&&<div style={{fontSize:9,color:"#38bdf8"}}>{cnt}</div>}
                          {isBlk&&<div style={{fontSize:9,color:"#f87171"}}>🚫</div>}
                        </button>
                      );
                    })
                  : <span style={{fontSize:14,fontWeight:600,color:"#94a3b8",flex:1,textAlign:"center"}}>{fmtLong(activeDay)}</span>
                }
                <button className="btn ghost" style={{padding:"6px 10px",fontSize:13,flexShrink:0}} onClick={()=>{
                  const d=new Date(activeDay+"T12:00:00");
                  d.setDate(d.getDate()+(schedView==="week"?7:1));
                  setActiveDay(d.toISOString().split("T")[0]);
                }}>›</button>
              </div>
            )}

            {/* Block day / vacation buttons */}
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              <button className="btn ghost" style={{fontSize:11,padding:"7px 12px"}}
                onClick={()=>toggleBlockDay(activeDay)}>
                {blocked.some(b=>b.date===activeDay&&b.time==="ALL")?"✓ Día desbloqueado":"🚫 Bloquear día"}
              </button>
              <button className="btn ghost" style={{fontSize:11,padding:"7px 12px",color:"#facc15"}}
                onClick={()=>setShowVacation(true)}>🏖 Vacaciones</button>
            </div>

            {/* DAY VIEW */}
            {schedView==="day"&&(
              <div className="card" style={{padding:0,overflow:"hidden"}}>
                {TIME_SLOTS.map((time,i)=>{
                  const slotBlocked=isBlocked(activeDay,time)||blocked.some(b=>b.date===activeDay&&b.time==="ALL");
                  const slots=!slotBlocked?sessions.filter(s=>s.date===activeDay&&s.time===time)
                    .map(s=>({...s,client:clients.find(c=>c.id===s.client_id)})).filter(s=>s.client):[];
                  return(
                    <div key={time} style={{display:"flex",borderBottom:i<TIME_SLOTS.length-1?"1px solid #0d1520":"none",minHeight:52,background:slotBlocked?"#0d0505":"transparent"}}>
                      <div className="mono" style={{width:56,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",borderRight:"1px solid #0d1520",color:slotBlocked?"#4a1515":"#1e3a5a",fontSize:11,fontWeight:700}}>{time}</div>
                      <div style={{flex:1,padding:"7px 10px",display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
                        {slotBlocked
                          ?<span style={{fontSize:11,color:"#4a1515",cursor:"pointer"}} onClick={()=>toggleBlock(activeDay,time)}>🚫 Bloqueado · toca para desbloquear</span>
                          :<>
                            {slots.length===0&&<span style={{fontSize:11,color:"#1e293b",cursor:"pointer"}} onClick={()=>toggleBlock(activeDay,time)}>Libre · 🔒</span>}
                            {slots.map(s=>(
                              <div key={s.id} style={{background:s.client.color+"18",border:`1px solid ${s.client.color}40`,borderRadius:8,padding:"5px 9px",fontSize:12,display:"flex",alignItems:"center",gap:6}}>
                                {s.client.avatar_url
                                  ?<img src={s.client.avatar_url} style={{width:20,height:20,borderRadius:"50%",objectFit:"cover"}}/>
                                  :<div className="ring" style={{width:20,height:20,background:s.client.color+"30",color:s.client.color,fontSize:8}}>{ini(s.client.name)}</div>
                                }
                                <span style={{color:s.client.color,fontWeight:700}}>{s.client.name}</span>
                                <span style={{color:"#475569",fontSize:11}}>{s.type}</span>
                                {s.requested&&<span style={{color:"#fb923c",fontSize:10}}>·req</span>}
                                <button style={{background:"none",border:"none",cursor:"pointer",color:"#4ade80",fontSize:12,padding:0}} onClick={()=>completeSession(s)}>✓</button>
                              </div>
                            ))}
                          </>
                        }
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* WEEK VIEW - horizontal grid */}
            {schedView==="week"&&(
              <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                <div style={{minWidth:560}}>
                  {/* Header row - days */}
                  <div style={{display:"grid",gridTemplateColumns:"52px repeat(5,1fr)",gap:2,marginBottom:4}}>
                    <div/>
                    {getWeekDays(activeDay).slice(0,5).map(day=>{
                      const isToday=day===TODAY;
                      const isBlkDay=blocked.some(b=>b.date===day&&b.time==="ALL");
                      const cnt=sessions.filter(s=>s.date===day).length;
                      return(
                        <div key={day} style={{textAlign:"center",padding:"6px 2px",borderRadius:8,
                          background:isToday?"#0c2040":isBlkDay?"#1a0808":"#080d14",
                          border:isToday?"1px solid #1e3a5a":isBlkDay?"1px solid #3f0f0f":"1px solid #0d1520"}}>
                          <div style={{fontSize:10,color:isBlkDay?"#4a1515":isToday?"#38bdf8":"#475569",fontWeight:700,textTransform:"capitalize"}}>
                            {new Date(day+"T12:00:00").toLocaleDateString("es-ES",{weekday:"short"})}
                          </div>
                          <div className="mono" style={{fontSize:14,fontWeight:700,color:isBlkDay?"#4a1515":isToday?"#38bdf8":"#e2e8f0"}}>
                            {new Date(day+"T12:00:00").getDate()}
                          </div>
                          {cnt>0&&!isBlkDay&&<div style={{fontSize:9,color:"#38bdf8"}}>{cnt} sesiones</div>}
                          {isBlkDay&&<div style={{fontSize:9,color:"#f87171"}}>🚫</div>}
                        </div>
                      );
                    })}
                  </div>
                  {/* Time rows */}
                  {TIME_SLOTS.map((time,i)=>(
                    <div key={time} style={{display:"grid",gridTemplateColumns:"52px repeat(5,1fr)",gap:2,marginBottom:2}}>
                      <div className="mono" style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#1e3a5a",fontWeight:700,paddingRight:4}}>{time}</div>
                      {getWeekDays(activeDay).slice(0,5).map(day=>{
                        const isBlkDay=blocked.some(b=>b.date===day&&b.time==="ALL");
                        const slotBlocked=isBlkDay||isBlocked(day,time);
                        const daySessions=sessions.filter(s=>s.date===day&&s.time===time)
                          .map(s=>({...s,client:clients.find(c=>c.id===s.client_id)})).filter(s=>s.client);
                        return(
                          <div key={day} style={{minHeight:40,borderRadius:6,padding:"3px",
                            background:slotBlocked?"#0d0505":daySessions.length>0?"#080d14":"#060a10",
                            border:slotBlocked?"1px solid #3f0f0f":daySessions.length>0?"1px solid #1e293b":"1px solid #0d1520",
                            cursor:"pointer"}}
                            onClick={()=>{if(!slotBlocked)toggleBlock(day,time);}}>
                            {slotBlocked&&<div style={{fontSize:9,color:"#4a1515",textAlign:"center",paddingTop:4}}>🚫</div>}
                            {daySessions.map(s=>(
                              <div key={s.id} style={{background:s.client.color+"25",borderRadius:4,padding:"2px 4px",marginBottom:2,cursor:"default"}}
                                onClick={e=>e.stopPropagation()}>
                                <div style={{fontSize:9,color:s.client.color,fontWeight:700,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                                  {s.client.name.split(" ")[0]}
                                </div>
                                <div style={{fontSize:8,color:"#475569"}}>{s.type}</div>
                                <button style={{background:"none",border:"none",cursor:"pointer",color:"#4ade80",fontSize:10,padding:0,display:"block"}} onClick={()=>completeSession(s)}>✓</button>
                              </div>
                            ))}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                  <p style={{fontSize:10,color:"#334155",marginTop:8,paddingLeft:56}}>💡 Toca celda vacía para bloquear/desbloquear ese slot</p>
                </div>
              </div>
            )}

            {/* Month view */}
            {schedView==="month"&&(
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={()=>{const d=new Date(calDate);d.setMonth(d.getMonth()-1);setCalDate(d);}}>‹</button>
                  <span style={{fontSize:14,fontWeight:600,textTransform:"capitalize"}}>{fmtMonth(calDate.toISOString().split("T")[0])}</span>
                  <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={()=>{const d=new Date(calDate);d.setMonth(d.getMonth()+1);setCalDate(d);}}>›</button>
                </div>
                <div className="card">
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
                    {["L","M","X","J","V","S","D"].map(d=>(
                      <div key={d} style={{textAlign:"center",fontSize:10,color:"#334155",fontWeight:700,padding:"3px 0"}}>{d}</div>
                    ))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                    {getMonthDays(calDate.getFullYear(),calDate.getMonth()).map((cell,i)=>{
                      const dateStr=cell.cur?getDayStr(cell.day):"";
                      const hasSess=dateStr&&sessions.some(s=>s.date===dateStr);
                      const isToday=dateStr===TODAY;
                      const blkEntry=dateStr&&blocked.find(b=>b.date===dateStr&&b.time==="ALL");
                      const isBlk=!!blkEntry&&blkEntry.reason==="Día bloqueado";
                      const isVac=!!blkEntry&&blkEntry.reason==="Vacaciones";
                      const isFest=!!blkEntry&&blkEntry.reason==="Festivo";
                      return(
                        <div key={i} style={{
                          aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",
                          alignItems:"center",justifyContent:"center",cursor:cell.cur?"pointer":"default",
                          fontSize:12,fontWeight:600,transition:"all .15s",
                          background:isVac?"#0a0f05":isFest?"#1a1000":isBlk?"#1a0808":hasSess&&cell.cur?"#0c2040":"transparent",
                          border:isToday?"1px solid #0ea5e9":isVac?"1px solid #14532d":isFest?"1px solid #78350f":isBlk?"1px solid #3f0f0f":"1px solid transparent",
                          color:!cell.cur?"#1e293b":isBlk?"#4a1515":isVac?"#4ade80":isFest?"#fb923c":isToday?"#0ea5e9":hasSess?"#38bdf8":"#94a3b8",
                          opacity:!cell.cur?0.3:1,
                        }}
                        onClick={()=>{
                          if(!cell.cur) return;
                          if(isBlk){toggleBlockDay(dateStr);}
                          else{setActiveDay(dateStr);setSchedView("day");}
                        }}>
                          <span>{cell.day}</span>
                          {hasSess&&cell.cur&&!isBlk&&!isVac&&!isFest&&<span style={{width:4,height:4,borderRadius:"50%",background:"#38bdf8",marginTop:1}}/>}
                          {isBlk&&<span style={{fontSize:8}}>🚫</span>}
                          {isVac&&<span style={{fontSize:8}}>🏖</span>}
                          {isFest&&<span style={{fontSize:8}}>🎉</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{marginTop:10,display:"flex",gap:10,fontSize:11,color:"#334155",flexWrap:"wrap",lineHeight:1.8}}>
                  <span>🔵 Sesiones</span>
                  <span>🚫 Bloqueado</span>
                  <span>🏖 Vacaciones</span>
                  <span>🎉 Festivo</span>
                  <span style={{color:"#0ea5e9"}}>Hoy</span>
                </div>
              </div>
            )}
            <p style={{fontSize:11,color:"#334155",marginTop:10}}>💡 Toca "Libre · 🔒" para bloquear una hora</p>
          </div>
        )}

        {/* FORUM ADMIN */}
        {view==="forum"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h1 className="mono" style={{fontSize:18,fontWeight:700}}>💬 Comunidad</h1>
              <span style={{fontSize:12,color:"#334155"}}>{forum.length} publicaciones</span>
            </div>
            {forum.length===0
              ? <div className="card" style={{textAlign:"center",padding:40}}>
                  <div style={{fontSize:28,marginBottom:8}}>💬</div>
                  <div style={{color:"#475569",fontSize:13}}>Sin publicaciones aún</div>
                </div>
              : forum.map(post=>{
                  const c=clients.find(x=>x.id===post.client_id);
                  return(
                    <div key={post.id} className="card" style={{marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        {c?.avatar_url
                          ? <img src={c.avatar_url} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover",border:`2px solid ${c?.color||"#38bdf8"}`}}/>
                          : <div className="ring" style={{width:36,height:36,background:(c?.color||"#38bdf8")+"20",color:c?.color||"#38bdf8",fontSize:12,border:`1.5px solid ${c?.color||"#38bdf8"}35`}}>{ini(post.client_name)}</div>
                        }
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:13}}>{post.client_name}</div>
                          <div style={{fontSize:11,color:"#334155"}}>{new Date(post.created_at).toLocaleDateString("es-ES",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
                        </div>
                        <button className="btn danger" style={{fontSize:10,padding:"4px 8px"}} onClick={async()=>{
                          await sb.from("forum_posts").delete().eq("id",post.id);
                          await loadAll();
                        }}>🗑</button>
                      </div>
                      <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.5,marginBottom:post.image_url?10:0}}>{post.content}</p>
                      {post.image_url&&<img src={post.image_url} style={{width:"100%",borderRadius:10,maxHeight:240,objectFit:"cover",marginTop:8}}/>}
                      <div style={{marginTop:8,fontSize:11,color:"#334155"}}>❤️ {post.likes} likes</div>
                    </div>
                  );
                })
            }
          </div>
        )}

        {/* CALENDAR */}
        {view==="calendar"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h1 className="mono" style={{fontSize:20,fontWeight:700}}>Calendario</h1>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={()=>{const d=new Date(calDate);d.setMonth(d.getMonth()-1);setCalDate(d);}}>‹</button>
                <span style={{fontSize:14,fontWeight:600,textTransform:"capitalize",minWidth:140,textAlign:"center"}}>{fmtMonth(calDate.toISOString().split("T")[0])}</span>
                <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={()=>{const d=new Date(calDate);d.setMonth(d.getMonth()+1);setCalDate(d);}}>›</button>
              </div>
            </div>
            <div className="card">
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
                {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d=>(
                  <div key={d} style={{textAlign:"center",fontSize:11,color:"#334155",fontWeight:700,padding:"4px 0"}}>{d}</div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                {calDays.map((cell,i)=>{
                  const dateStr=cell.cur?getDayStr(cell.day):"";
                  const hasSess=dateStr&&sessions.some(s=>s.date===dateStr);
                  const isToday=dateStr===TODAY;
                  const isBlk=dateStr&&blocked.some(b=>b.date===dateStr);
                  return(
                    <div key={i} className={`cal-day ${!cell.cur?"other-month":""} ${hasSess&&cell.cur?"has-session":""} ${isToday?"today":""} ${isBlk&&cell.cur?"blocked":""}`}
                      onClick={()=>cell.cur&&setActiveDay(dateStr)&&setView("schedule")}>
                      <span>{cell.day}</span>
                      {hasSess&&cell.cur&&<span style={{position:"absolute",width:4,height:4,borderRadius:"50%",background:"#38bdf8",bottom:2,left:"50%",transform:"translateX(-50%)"}}/>}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{marginTop:16,display:"flex",gap:12,fontSize:11,color:"#334155"}}>
              <span>🔵 Con sesiones</span>
              <span>🔴 Bloqueado</span>
              <span style={{color:"#0ea5e9"}}>Hoy</span>
            </div>
          </div>
        )}

        {/* INCOME */}
        {view==="income"&&(
          <div>
            <h1 className="mono" style={{fontSize:20,fontWeight:700,marginBottom:22}}>Ingresos</h1>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:22}}>
              {[
                {label:"Este mes",val:`${monthIncome}€`,color:"#4ade80"},
                {label:"Total acumulado",val:`${totalIncome}€`,color:"#38bdf8"},
                {label:"Pagos registrados",val:payments.length,color:"#a78bfa"},
                {label:"Ticket medio",val:`${payments.length>0?Math.round(totalIncome/payments.length):0}€`,color:"#fb923c"},
              ].map(s=>(
                <div key={s.label} className="card">
                  <div className="mono" style={{fontSize:22,fontWeight:700,color:s.color}}>{s.val}</div>
                  <div style={{fontSize:10,color:"#334155",marginTop:5,fontWeight:700}}>{s.label.toUpperCase()}</div>
                </div>
              ))}
            </div>
            <div className="card">
              <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>Historial de pagos</h3>
              {payments.length===0?<p style={{fontSize:13,color:"#1e293b"}}>Sin pagos registrados aún</p>
                :payments.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #0d1520"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600}}>{p.client_name}</div>
                      <div style={{fontSize:11,color:"#475569",marginTop:2}}>{p.paid_at}</div>
                    </div>
                    <div className="mono" style={{fontSize:15,fontWeight:700,color:"#4ade80"}}>{p.amount}€</div>
                  </div>
                ))
              }
            </div>
          </div>
        )}

        {/* REMINDERS */}
        {view==="reminders"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h1 className="mono" style={{fontSize:20,fontWeight:700}}>Alertas</h1>
              <button className="btn wa" onClick={()=>setShowBulkWA(true)}>📱 WA masivo</button>
            </div>
            {requests.length>0&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,color:"#fb923c",fontWeight:700,letterSpacing:1,marginBottom:10}}>SOLICITUDES</div>
                {requests.map(r=>{
                  const c=clients.find(x=>x.id===r.client_id); if(!c) return null;
                  return(
                    <div key={r.id} className="card" style={{marginBottom:8,border:"1px solid #2d1a08"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div className="ring" style={{width:40,height:40,background:c.color+"18",color:c.color,fontSize:12}}>{ini(c.name)}</div>
                        <div style={{flex:1}}><div style={{fontWeight:700}}>{c.name}</div><div style={{fontSize:12,color:"#fb923c"}}>📅 {r.type} · {fmtDate(r.date)} a las {r.time}</div></div>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn grn" style={{fontSize:11,padding:"7px 11px"}} onClick={()=>approveRequest(r.id)}>✓</button>
                          <button className="btn danger" onClick={()=>denyRequest(r.id)}>✕</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {reminders.length===0&&requests.length===0
              ?<div className="card" style={{textAlign:"center",padding:48}}><div style={{fontSize:32,marginBottom:10}}>✓</div><div style={{color:"#4ade80",fontWeight:700}}>Todo al día</div></div>
              :reminders.map((r,i)=>(
                <div key={i} className="card" style={{marginBottom:10,border:`1px solid ${r.urgent?"#3f1a1a":"#1a2d1a"}`,background:r.urgent?"#080404":"#040804"}}>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div className="ring" style={{width:42,height:42,background:r.c.color+"18",color:r.c.color,fontSize:13}}>{ini(r.c.name)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700}}>{r.c.name}</div>
                      <div style={{fontSize:12,color:r.urgent?"#f87171":"#facc15",marginTop:2}}>
                        {r.type==="payment"&&`💳 ${r.c.payment_amount}€ — ${r.days<0?`vencido hace ${Math.abs(r.days)}d`:r.days===0?"vence hoy":`en ${r.days}d`}`}
                        {r.type==="sessions"&&`⚡ ${r.c.sessions_left} sesión(es) restante(s)`}
                        {r.type==="expired"&&"🚫 Sin sesiones — necesita renovación"}
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {r.type==="payment"&&<button className="btn sky" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setShowPay(r.c)}>💳 Pago</button>}
                      {(r.type==="sessions"||r.type==="expired")&&<button className="btn grn" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>renewSessions(r.c)}>↺ Renovar</button>}
                      <button className="btn wa" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setWaClient(r.c)}>📱 WA</button>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

        {/* EXERCISES VIEW */}
        {view==="exercises"&&(
          <ExercisesAdmin exercises={exercises} loadAll={loadAll} notify={notify}/>
        )}

        {/* PLANS VIEW */}
        {view==="plans"&&(
          <PlansAdmin plans={plans} exercises={exercises} clients={clients} clientPlans={clientPlans} loadAll={loadAll} notify={notify}/>
        )}

      {/* Modals */}
      {showNS&&<SessionModal clients={clients} ns={ns} setNs={setNs} onSave={addSession} onClose={()=>setShowNS(false)}/>}
      {showNC&&<ClientModal nc={nc} setNc={setNc} onSave={addClient} onClose={()=>setShowNC(false)}/>}
      {showPay&&<PayModal client={showPay} onSave={(amt)=>markPayment(showPay,amt)} onClose={()=>setShowPay(null)}/>}

function ClientPortal({client,allSessions,allHistory,allClients,blocked,forum,exercises,plans,clientPlans,myProgress,myRecords,myAchievements,loadAll,notify,onLogout}) {
  const [tab,setTab]=React.useState("home");
  const [reqDate,setReqDate]=React.useState(TODAY);
  const [reqTime,setReqTime]=React.useState("07:00");
  const [reqType,setReqType]=React.useState("Fuerza");
  const [saving,setSaving]=React.useState(false);

  const mySessions=allSessions.filter(s=>s.client_id===client.id&&s.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date));
  const myHistory=allHistory.filter(s=>s.client_id===client.id).sort((a,b)=>b.date.localeCompare(a.date));
  const pct=Math.round(client.sessions_left/client.total_sessions*100);
  const pd=daysUntil(client.next_payment);
  const streak=calcStreak(myHistory);
  const nextSess=mySessions.find(s=>!s.requested);
  const nextCountdown=nextSess?daysUntil(nextSess.date):null;
  const thisMonthSessions=myHistory.filter(h=>h.date&&h.date.startsWith(new Date().toISOString().slice(0,7))).length;

  const submitRequest=async()=>{
    if(client.sessions_left===0) return notify("Sin sesiones. Contacta a tu trainer.","err");
    setSaving(true);
    const {error}=await sb.from("sessions").insert({client_id:client.id,date:reqDate,time:reqTime,type:reqType,status:"pending",requested:true});
    if(error){notify("Error al enviar","err");setSaving(false);return;}
    await loadAll(); setSaving(false);
    notify("¡Solicitud enviada! Tu trainer la confirmará pronto 🎯");
    setTab("home");
  };

  return(
    <div style={{minHeight:"100vh",maxWidth:480,margin:"0 auto",padding:"22px 16px"}} className="fade">
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#0ea5e9,#4ade80)",zIndex:500}}/>}

      {client.welcome_msg&&(
        <div style={{background:"#060f1e",border:"1px solid #0e3a5c",borderRadius:14,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#94a3b8"}}>
          💬 {client.welcome_msg}

// ── MULTI SESSION REQUEST ─────────────────────────────────────────────────
function MultiSessionRequest({client, loadAll, notify, saving, setSaving}) {
  const emptySlot = () => ({date: TODAY, time: "08:00", type: "Fuerza"});
  const [slots, setSlots] = React.useState([emptySlot()]);

  const addSlot = () => {
    if(slots.length >= client.sessions_left) return notify(`Solo tienes ${client.sessions_left} sesiones disponibles`,"err");
    if(slots.length >= 10) return notify("Máximo 10 sesiones a la vez","err");
    setSlots(s=>[...s, emptySlot()]);
  };

  const removeSlot = (i) => setSlots(s=>s.filter((_,idx)=>idx!==i));

  const updateSlot = (i, field, val) => setSlots(s=>s.map((slot,idx)=>idx===i?{...slot,[field]:val}:slot));

  const submitAll = async() => {
    const invalid = slots.find(s=>!s.date||!s.time||!s.type);
    if(invalid) return notify("Completa todos los campos","err");
    setSaving(true);
    const inserts = slots.map(s=>({
      client_id: client.id,
      date: s.date,
      time: s.time,
      type: s.type,
      status: "pending",
      requested: true,
    }));
    const {error} = await sb.from("sessions").insert(inserts);
    if(error){ notify("Error al enviar","err"); setSaving(false); return; }
    await loadAll();
    setSaving(false);
    setSlots([emptySlot()]);
    notify(`✓ ${inserts.length} sesión${inserts.length>1?"es":""} solicitada${inserts.length>1?"s":""}! Tu trainer las confirmará pronto 🎯`);
  };

  return(
    <div className="card">
      <div style={{background:"#080f1e",borderRadius:10,padding:"11px 13px",border:"1px solid #1e3a5a",fontSize:13,color:"#475569",marginBottom:16}}>
        💡 Puedes solicitar varias sesiones a la vez. Tu trainer las confirmará en breve.
        <div style={{marginTop:4,fontSize:12,color:"#334155"}}>Sesiones disponibles: <span style={{color:"#38bdf8",fontWeight:700}}>{client.sessions_left}</span></div>
      </div>

      {slots.map((slot,i)=>(
        <div key={i} style={{background:"#080d14",borderRadius:12,padding:"12px",marginBottom:10,border:"1px solid #1e293b"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,color:"#38bdf8"}}>Sesión {i+1}</span>
            {slots.length>1&&<button onClick={()=>removeSlot(i)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div><span className="lbl">FECHA</span>
              <input type="date" className="inp" value={slot.date} min={TODAY} onChange={e=>updateSlot(i,"date",e.target.value)}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><span className="lbl">HORA</span>
                <select className="inp" style={{appearance:"none"}} value={slot.time} onChange={e=>updateSlot(i,"time",e.target.value)}>
                  {TIME_SLOTS.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div><span className="lbl">TIPO</span>
                <select className="inp" style={{appearance:"none"}} value={slot.type} onChange={e=>updateSlot(i,"type",e.target.value)}>
                  {SESSION_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            </div>
          </div>
        </div>
      ))}

      <div style={{display:"flex",gap:8,marginTop:4}}>
        {slots.length < Math.min(client.sessions_left, 10) &&(
          <button className="btn ghost" style={{flex:1,padding:11,fontSize:13}} onClick={addSlot}>+ Añadir sesión</button>
        )}
        <button className="btn sky" style={{flex:2,padding:11,fontSize:13}} onClick={submitAll} disabled={saving}>
          {saving?"Enviando...":`Solicitar ${slots.length} sesión${slots.length>1?"es":""} 🚀`}
        </button>
      </div>
    </div>
  );
}

// ── CLIENT CALENDAR ───────────────────────────────────────────────────────
function ClientCalendar({client, allSessions, allClients, blocked}) {
  const [calWeek, setCalWeek] = React.useState(TODAY);
  const weekDays = getWeekDays(calWeek);
  const workDays = weekDays.slice(0,5); // Mon-Fri

  // Group sessions by day
  const sessionsByDay = {};
  workDays.forEach(day => {
    sessionsByDay[day] = allSessions
      .filter(s=>s.date===day&&!s.requested)
      .sort((a,b)=>a.time.localeCompare(b.time));
  });

  const hasAnySessions = workDays.some(d=>sessionsByDay[d].length>0);

  return(
    <div>
      {/* Week nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button className="btn ghost" style={{padding:"7px 12px",fontSize:13}} onClick={()=>{
          const d=new Date(calWeek+"T12:00:00"); d.setDate(d.getDate()-7);
          setCalWeek(d.toISOString().split("T")[0]);
        }}>‹ Ant.</button>
        <span style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>
          {new Date(workDays[0]+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short"})} – {new Date(workDays[4]+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short"})}
        </span>
        <button className="btn ghost" style={{padding:"7px 12px",fontSize:13}} onClick={()=>{
          const d=new Date(calWeek+"T12:00:00"); d.setDate(d.getDate()+7);
          setCalWeek(d.toISOString().split("T")[0]);
        }}>Sig. ›</button>
      </div>

      {!hasAnySessions
        ? <div className="card" style={{textAlign:"center",padding:34}}>
            <div style={{fontSize:26,marginBottom:8}}>📅</div>
            <div style={{color:"#475569",fontSize:13}}>Sin clases esta semana</div>
          </div>
        : workDays.map(day=>{
            const daySess = sessionsByDay[day];
            const isToday = day===TODAY;
            if(daySess.length===0) return(
              <div key={day} style={{marginBottom:10,opacity:0.4}}>
                <div style={{fontSize:11,fontWeight:700,color:"#334155",marginBottom:4,textTransform:"capitalize",paddingLeft:4}}>
                  {new Date(day+"T12:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"short"})}
                </div>
                <div style={{fontSize:11,color:"#1e293b",padding:"8px 12px",background:"#080d14",borderRadius:8}}>Sin clases</div>
              </div>
            );
            return(
              <div key={day} style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:isToday?"#38bdf8":"#475569",textTransform:"capitalize"}}>
                    {new Date(day+"T12:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"short"})}
                  </div>
                  {isToday&&<span style={{fontSize:10,background:"#0c2040",color:"#38bdf8",padding:"2px 7px",borderRadius:10,fontWeight:700}}>Hoy</span>}
                  <span style={{fontSize:10,color:"#334155"}}>{daySess.length} clase{daySess.length>1?"s":""}</span>
                </div>
                {daySess.map(s=>{
                  const c=allClients.find(x=>x.id===s.client_id);
                  if(!c) return null;
                  const isMe=c.id===client.id;
                  return(
                    <div key={s.id} style={{
                      display:"flex",alignItems:"center",gap:10,
                      padding:"10px 12px",borderRadius:12,marginBottom:6,

                      {c.avatar_url
                        ?<img src={c.avatar_url} style={{width:34,height:34,borderRadius:"50%",objectFit:"cover",border:`2px solid ${isMe?c.color+"80":c.color+"40"}`,flexShrink:0}}/>
                        :<div className="ring" style={{width:34,height:34,background:c.color+(isMe?"30":"18"),color:c.color,fontSize:11,border:`1.5px solid ${c.color}${isMe?"60":"30"}`,flexShrink:0}}>{ini(c.name)}</div>
                      }

                      </div>
                      {isMe&&<div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>

// ── FORUM TAB ──────────────────────────────────────────────────────────────
function ForumTab({client, forum, allClients, loadAll, notify}) {
  const [text, setText] = React.useState("");
  const [imgFile, setImgFile] = React.useState(null);
  const [imgPreview, setImgPreview] = React.useState(null);
  const [posting, setPosting] = React.useState(false);

  const handleImg = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    setImgFile(file);
    const reader = new FileReader();
    reader.onload = ev => setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const submitPost = async() => {
    if(!text.trim() && !imgFile) return notify("Escribe algo primero","err");
    setPosting(true);
    let image_url = null;
    if(imgFile) {
      const ext = imgFile.name.split(".").pop();
      const path = `${client.id}_${Date.now()}.${ext}`;
      const {error:upErr} = await sb.storage.from("forum").upload(path, imgFile, {upsert:true});
      if(!upErr) {
        const {data} = sb.storage.from("forum").getPublicUrl(path);
        image_url = data.publicUrl;
      }
    }
    await sb.from("forum_posts").insert({
      client_id: client.id,
      client_name: client.name,
      content: text.trim(),
      image_url,
    });
    setText(""); setImgFile(null); setImgPreview(null);
    await loadAll();
    setPosting(false);
    notify("Publicado ✓");
  };

  const toggleLike = async(post) => {
    const liked = (post.liked_by||[]).includes(client.id);
    const newLikedBy = liked
      ? post.liked_by.filter(id=>id!==client.id)
      : [...(post.liked_by||[]), client.id];
    await sb.from("forum_posts").update({
      likes: newLikedBy.length,
      liked_by: newLikedBy,
    }).eq("id", post.id);
    await loadAll();
  };

  return(
    <div>
      {/* Post composer */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
          {client.avatar_url
            ? <img src={client.avatar_url} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover",border:`2px solid ${client.color}`,flexShrink:0}}/>
            : <div className="ring" style={{width:36,height:36,background:client.color+"20",color:client.color,fontSize:12,border:`1.5px solid ${client.color}40`,flexShrink:0}}>{ini(client.name)}</div>
          }
          <textarea className="inp" rows={3} style={{resize:"none",fontSize:13}} 
            placeholder="Comparte tu progreso, pregunta algo, motiva al equipo... 💪"
            value={text} onChange={e=>setText(e.target.value)}/>
        </div>
        {imgPreview&&(
          <div style={{position:"relative",marginBottom:10}}>
            <img src={imgPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover"}}/>
            <button onClick={()=>{setImgFile(null);setImgPreview(null);}} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.7)",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",color:"#fff",fontSize:12}}>✕</button>
          </div>
        )}
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="file" accept="image/*" id="forumImg" style={{display:"none"}} onChange={handleImg}/>
          <label htmlFor="forumImg" className="btn ghost" style={{fontSize:12,padding:"7px 12px",cursor:"pointer"}}>📷 Foto</label>
          <button className="btn sky" style={{flex:1,padding:"9px"}} onClick={submitPost} disabled={posting}>
            {posting?"Publicando...":"Publicar 🚀"}
          </button>
        </div>
      </div>

      {/* Posts */}
      {forum.length===0
        ? <div className="card" style={{textAlign:"center",padding:34}}>
            <div style={{fontSize:28,marginBottom:8}}>💬</div>
            <div style={{color:"#475569",fontSize:13}}>Sé el primero en publicar algo 💪</div>
          </div>
        : forum.map(post=>{
            const c=allClients.find(x=>x.id===post.client_id);
            const liked=(post.liked_by||[]).includes(client.id);
            const isMe=post.client_id===client.id;
            return(
              <div key={post.id} className="card" style={{marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  {c?.avatar_url
                    ? <img src={c.avatar_url} style={{width:38,height:38,borderRadius:"50%",objectFit:"cover",border:`2px solid ${c.color||"#38bdf8"}`}}/>
                    : <div className="ring" style={{width:38,height:38,background:(c?.color||"#38bdf8")+"20",color:c?.color||"#38bdf8",fontSize:12,border:`1.5px solid ${c?.color||"#38bdf8"}35`}}>{ini(post.client_name)}</div>
                  }
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13}}>{post.client_name} {isMe&&<span style={{fontSize:10,color:"#38bdf8"}}>· tú</span>}</div>
                    <div style={{fontSize:11,color:"#334155"}}>{new Date(post.created_at).toLocaleDateString("es-ES",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
                  </div>
                </div>
                {post.content&&<p style={{fontSize:13,color:"#94a3b8",lineHeight:1.55,marginBottom:post.image_url?10:8}}>{post.content}</p>}
                {post.image_url&&<img src={post.image_url} style={{width:"100%",borderRadius:10,maxHeight:260,objectFit:"cover",marginBottom:8}}/>}
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={()=>toggleLike(post)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:liked?"#f87171":"#475569",display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:8,transition:"all .15s"}}>
                    {liked?"❤️":"🤍"} <span style={{fontWeight:600}}>{post.likes||0}</span>
                  </button>
                </div>
              </div>
            );
          })
      }
    </div>
  );
}
